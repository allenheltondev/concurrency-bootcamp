name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # One global group: every merge deploys the same stack, so concurrent
  # runs must serialize, not race. cancel-in-progress false so a mid-deploy
  # CloudFormation update isn't torn out from under itself.
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: concurrency-bootcamp

jobs:
  # The same validation PRs run, re-run here as a gate: a push to main or a
  # manual dispatch cannot deploy a commit that fails CI.
  validate:
    name: Validate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: sam deploy production
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: Production
      # Surfaces on the run as "Deployed to Production" with this URL.
      url: ${{ steps.outputs.outputs.site-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-ConcurrencyBootcamp-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend dependencies
        # Powertools (bundled into the lambdalith) + esbuild (used by sam build).
        run: npm ci
        working-directory: backend

      - name: SAM build
        # esbuild-bundles the lambdalith (backend/src/api.mjs); the AWS SDK
        # stays external because the Lambda runtime ships it.
        run: sam build

      - name: SAM deploy
        # Domain + zone + user pool come from repo variables so the template
        # stays generic. COGNITO_USER_POOL_ID unset -> UserPoolId is empty ->
        # the template's BackendEnabled condition is false and the stack
        # deploys the static site only, exactly as before the backend existed.
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "DomainName=${{ vars.DOMAIN_NAME }}" \
              "HostedZoneId=${{ vars.HOSTED_ZONE_ID }}" \
              "UserPoolId=${{ vars.COGNITO_USER_POOL_ID }}"

      - name: Diagnose failed deploy
        if: ${{ failure() }}
        run: |
          echo "Deploy failed. Dumping CloudFormation diagnostics for ${{ env.STACK_NAME }}."

          echo "==== describe-stack-events (latest 50) ===="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackEvents[:50].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table || true

          echo "==== list-stack-resources ===="
          aws cloudformation list-stack-resources \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StackResourceSummaries[*].[LogicalResourceId,ResourceType,ResourceStatus,PhysicalResourceId]" \
            --output table || true

      - name: Read stack outputs
        id: outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output json)
          read_out() {
            echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'
          }
          {
            echo "site-url=$(read_out SiteUrl)"
            echo "bucket=$(read_out BucketName)"
            echo "distribution-id=$(read_out DistributionId)"
            echo "table-name=$(read_out TableName)"
          } >> "$GITHUB_OUTPUT"

      - name: Seed course & badge catalogs
        # Idempotent PutRequests — re-seeding overwrites catalog entries in
        # place and never touches user partitions. Editing backend/data/*.json
        # and merging is how a course or badge ships.
        if: ${{ vars.COGNITO_USER_POOL_ID != '' }}
        run: |
          TABLE="${{ steps.outputs.outputs.table-name }}"
          node backend/tools/seed-catalog.mjs "$TABLE" > /tmp/seed-chunks.json
          count=$(jq length /tmp/seed-chunks.json)
          for i in $(seq 0 $((count - 1))); do
            jq ".[$i]" /tmp/seed-chunks.json > /tmp/chunk.json
            unprocessed=$(aws dynamodb batch-write-item \
              --request-items file:///tmp/chunk.json \
              --query 'UnprocessedItems' --output json)
            if [ "$unprocessed" != "{}" ]; then
              echo "batch $i left unprocessed items: $unprocessed"
              exit 1
            fi
          done
          echo "catalogs seeded"

      - name: Upload site to S3
        # Short max-age so content updates surface fast; the invalidation
        # below covers the window in between.
        run: |
          BUCKET="${{ steps.outputs.outputs.bucket }}"
          aws s3 cp index.html "s3://${BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=300"
          aws s3 cp worker.js "s3://${BUCKET}/worker.js" \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=300"
          # App scripts (core/content/packs/app) — everything under js/.
          # sync --delete so a renamed or removed pack doesn't linger in the
          # bucket serving stale code forever.
          aws s3 sync js/ "s3://${BUCKET}/js/" --delete \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=300"
          # PWA assets. The service worker must not be cached long, or
          # clients stay pinned to a stale build.
          aws s3 cp sw.js "s3://${BUCKET}/sw.js" \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=0, must-revalidate"
          aws s3 cp manifest.webmanifest "s3://${BUCKET}/manifest.webmanifest" \
            --content-type "application/manifest+json; charset=utf-8" \
            --cache-control "public, max-age=300"
          aws s3 cp icon.svg "s3://${BUCKET}/icon.svg" \
            --content-type "image/svg+xml" \
            --cache-control "public, max-age=300"
          # Distributed Systems course — a sibling directory with the same
          # internal layout (see docs/COURSE_PATTERN.md). Its pages reuse the
          # shared engine at /js/app.js uploaded above.
          aws s3 cp distributed-systems/index.html "s3://${BUCKET}/distributed-systems/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=300"
          aws s3 sync distributed-systems/js/ "s3://${BUCKET}/distributed-systems/js/" --delete \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=300"
          aws s3 cp distributed-systems/sw.js "s3://${BUCKET}/distributed-systems/sw.js" \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=0, must-revalidate"
          aws s3 cp distributed-systems/manifest.webmanifest "s3://${BUCKET}/distributed-systems/manifest.webmanifest" \
            --content-type "application/manifest+json; charset=utf-8" \
            --cache-control "public, max-age=300"
          aws s3 cp distributed-systems/icon.svg "s3://${BUCKET}/distributed-systems/icon.svg" \
            --content-type "image/svg+xml" \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront and wait for completion
        # Waiting (instead of fire-and-forget) means the smoke test below
        # sees the build we just uploaded, not a stale cached copy — and the
        # run isn't green until the CDN is actually serving the new version.
        run: |
          DIST_ID="${{ steps.outputs.outputs.distribution-id }}"
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --query "Invalidation.Id" --output text)
          echo "created invalidation ${INV_ID}, waiting for it to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DIST_ID" --id "$INV_ID"
          echo "invalidation complete"

      - name: Smoke test the live site
        # The deploy isn't done because the AWS calls succeeded — it's done
        # when the site serves the bits we just pushed. Verify status codes,
        # the COOP/COEP isolation headers the whole app depends on, and that
        # the served index.html is byte-identical to this commit's.
        run: |
          URL="${{ steps.outputs.outputs.site-url }}"
          fail=0

          # `|| true` on the curls: a connection failure should show up as a
          # ✗ line in the report below, not abort the step (bash -e) opaquely.
          for p in / /worker.js /sw.js /manifest.webmanifest /js/app.js /js/core.js /js/content.js \
                   /distributed-systems/ /distributed-systems/sw.js /distributed-systems/js/content.js; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "${URL}${p}" || true)
            if [ "$code" = "200" ]; then
              echo "✓ ${p} -> ${code}"
            else
              echo "✗ ${p} -> ${code} (expected 200)"
              fail=1
            fi
          done

          headers=$(curl -sSI "${URL}/" || true)
          echo "$headers" | grep -qi "^cross-origin-opener-policy: same-origin" \
            && echo "✓ COOP: same-origin" || { echo "✗ missing Cross-Origin-Opener-Policy: same-origin"; fail=1; }
          echo "$headers" | grep -qi "^cross-origin-embedder-policy: require-corp" \
            && echo "✓ COEP: require-corp" || { echo "✗ missing Cross-Origin-Embedder-Policy: require-corp"; fail=1; }

          served=$(curl -sS "${URL}/" 2>/dev/null | sha256sum | cut -d' ' -f1)
          local_hash=$(sha256sum index.html | cut -d' ' -f1)
          if [ "$served" = "$local_hash" ]; then
            echo "✓ served index.html matches this commit"
          else
            echo "✗ served index.html (${served}) != repo index.html (${local_hash}) — CDN is serving a stale build"
            fail=1
          fi

          served_ds=$(curl -sS "${URL}/distributed-systems/" 2>/dev/null | sha256sum | cut -d' ' -f1)
          local_ds=$(sha256sum distributed-systems/index.html | cut -d' ' -f1)
          if [ "$served_ds" = "$local_ds" ]; then
            echo "✓ served distributed-systems/index.html matches this commit"
          else
            echo "✗ served distributed-systems/index.html (${served_ds}) != repo copy (${local_ds}) — stale build or directory rewrite broken"
            fail=1
          fi

          exit $fail

      - name: Smoke test the API
        # Only meaningful once the backend is enabled. An unauthenticated
        # request must be rejected with 401 — that single probe proves both
        # the CloudFront /api/* routing (a 404/403 would mean the behavior or
        # route is wrong) and that the JWT authorizer is in front of the API.
        if: ${{ vars.COGNITO_USER_POOL_ID != '' }}
        run: |
          URL="${{ steps.outputs.outputs.site-url }}"
          code=$(curl -sS -o /dev/null -w "%{http_code}" "${URL}/api/health" || true)
          if [ "$code" = "401" ]; then
            echo "✓ /api/health unauthenticated -> 401 (routing + authorizer active)"
          else
            echo "✗ /api/health -> ${code} (expected 401)"
            exit 1
          fi

      - name: Write deployment summary
        run: |
          {
            echo "## Concurrency Bootcamp production deploy"
            echo
            echo "- **Stack:** \`${{ env.STACK_NAME }}\`"
            echo "- **Region:** \`${{ env.AWS_REGION }}\`"
            echo "- **Site URL:** ${{ steps.outputs.outputs.site-url }}"
            echo "- **Bucket:** \`${{ steps.outputs.outputs.bucket }}\`"
            echo "- **Distribution:** \`${{ steps.outputs.outputs.distribution-id }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
