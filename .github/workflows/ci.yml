name: CI

on:
  pull_request:
  # No push trigger for main: deploy.yml calls this workflow as its gating
  # job on every main push, so a standalone run there would be a duplicate.
  # Lets deploy.yml run this exact validation before deploying, so a deploy
  # can never start from a commit that hasn't passed CI.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate template & JS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Lint SAM template
        # No AWS creds needed: --lint runs cfn-lint locally against the template.
        run: sam validate --lint --region us-east-1

      - name: Check JavaScript syntax
        # App scripts live in js/ (now just the shared engine + account
        # layer) plus each course directory (js-concurrency/,
        # distributed-systems/), the standalone files (worker, Node
        # reference, service workers) and the backend Lambda handlers. Parse
        # them all so a typo can't ship a broken page, worker, cache, or API
        # route.
        run: |
          node --check js-concurrency/worker.js
          node --check js-concurrency/workers-atomics.js
          node --check sw.js
          node --check js-concurrency/sw.js
          node --check distributed-systems/sw.js
          node --check agent-memory/sw.js
          node --check database-internals/sw.js
          node --check performance/sw.js
          node --check observability/sw.js
          for f in js/*.js js-concurrency/js/*.js js-concurrency/js/packs/*.js distributed-systems/js/*.js distributed-systems/js/packs/*.js agent-memory/js/*.js agent-memory/js/packs/*.js database-internals/js/*.js database-internals/js/packs/*.js performance/js/*.js performance/js/packs/*.js observability/js/*.js observability/js/packs/*.js backend/src/*.mjs backend/src/*/*.mjs; do
            [ -e "$f" ] || continue
            node --check "$f"
          done
          echo "all app scripts parse OK"

      - name: Validate content (js-concurrency)
        # Executes every write-it exercise's reference solution against its
        # own sandbox tests and runs every drill demo — a broken exercise or
        # a content pack with failing assertions cannot merge.
        run: node tools/validate-content.mjs --root js-concurrency

      - name: Validate content (distributed-systems)
        run: node tools/validate-content.mjs --root distributed-systems

      - name: Validate content (agent-memory)
        run: node tools/validate-content.mjs --root agent-memory

      - name: Validate content (database-internals)
        run: node tools/validate-content.mjs --root database-internals

      - name: Validate content (performance)
        run: node tools/validate-content.mjs --root performance

      - name: Validate content (observability)
        run: node tools/validate-content.mjs --root observability

      - name: Validate the account layer
        # Loads js/account.js in a bare VM (proving it stays dormant without
        # a DOM) and exercises the sync merge rules multi-device depends on.
        run: node tools/validate-account.mjs

      - name: Validate backend catalogs
        # Dry run of the deploy-time seeder: parses backend/data/*.json,
        # checks ids/criteria/course references, and computes totalItems from
        # the real app content — a bad catalog entry cannot merge.
        run: node backend/tools/seed-catalog.mjs ci-dry-run > /dev/null

      - name: Install platform dependencies
        run: npm ci
        working-directory: platform

      - name: Lint the platform app
        run: npm run lint
        working-directory: platform

      - name: Test the platform app
        run: npm test
        working-directory: platform

      - name: Build the platform app
        # tsc --noEmit + vite build — a type error or broken import cannot merge.
        run: npm run build
        working-directory: platform

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint the backend
        # @eslint/js recommended rules, plus a boundary rule: src/domain (the
        # hexagonal core) may not import the AWS SDK, Powertools, or adapters.
        run: npm run lint
        working-directory: backend

      - name: Test the backend API
        # Drives the exported lambdalith handler with synthetic API Gateway
        # events — the full middy -> Powertools -> router -> handler chain —
        # against an in-memory DynamoDB fake (see backend/test/).
        run: npm test
        working-directory: backend

      - name: Run practice pack tests against reference solutions
        # Stages practice/solutions/*.mjs over the skeleton slots and runs
        # every practice/*.test.mjs suite, so an edit that breaks a test or
        # its reference solution (or orphans either one) cannot merge.
        run: node tools/test-solutions.mjs --root js-concurrency

      - name: Run distributed-systems practice pack tests
        run: node tools/test-solutions.mjs --root distributed-systems

      - name: Run agent-memory practice pack tests
        run: node tools/test-solutions.mjs --root agent-memory

      - name: Run database-internals practice pack tests
        run: node tools/test-solutions.mjs --root database-internals

      - name: Run performance practice pack tests
        run: node tools/test-solutions.mjs --root performance

      - name: Run observability practice pack tests
        run: node tools/test-solutions.mjs --root observability

      - name: Check service workers precache every app script
        # A js/ file missing from a SHELL list breaks that course offline.
        # The root sw.js is now a kill-switch (no SHELL) so it's excluded here.
        run: |
          node -e '
            const fs = require("fs");
            const courses = ["js-concurrency", "distributed-systems", "agent-memory",
                             "database-internals", "performance", "observability"];
            let failed = false;
            for (const course of courses) {
              const sw = fs.readFileSync(course + "/sw.js", "utf8");
              const dir = course + "/js";
              const files = ["js/core.js", "js/content.js", "js/sim.js",
                ...(fs.existsSync(dir + "/packs") ? fs.readdirSync(dir + "/packs").filter(f => f.endsWith(".js")).map(f => "js/packs/" + f) : [])];
              const missing = files.filter(f => !sw.includes("./" + f));
              if (!sw.includes("../js/app.js")) missing.push("../js/app.js (shared engine)");
              if (!sw.includes("../js/account.js")) missing.push("../js/account.js (account layer)");
              if (missing.length) { console.error(course + "/sw.js SHELL is missing: " + missing.join(", ")); failed = true; }
              else console.log(course + "/sw.js precaches all " + (files.length + 2) + " app scripts");
            }
            if (failed) process.exit(1);
          '
