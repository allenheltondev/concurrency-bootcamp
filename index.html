<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Concurrency Bootcamp</title>
<meta name="description" content="A mobile-first, offline-capable bootcamp for JavaScript concurrency — lessons, drills, and a scored test.">
<!-- PWA: installable + works offline -->
<meta name="theme-color" content="#14161f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concurrency">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#14161f; --surface:#1b1f2e; --surface2:#232940; --line:#2c3350;
    --text:#e7e9f3; --muted:#9298b0; --faint:#6a7090;
    --ordered:#57e0b0;   /* in-order / correct */
    --race:#ff9a6b;      /* lost / contention */
    --accent:#8e86f0;    /* interactive */
    --ok-bg:rgba(87,224,176,.12); --bad-bg:rgba(255,154,107,.12);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    line-height:1.55; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  /* header */
  header{
    position:sticky;top:0;z-index:20;background:rgba(20,22,31,.86);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:17px;letter-spacing:-.01em}
  .brand .tick{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em}
  .prog{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right}
  .prog .n{color:var(--ordered)}
  .bar{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:10px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--ordered));transition:width .4s ease}

  /* module chips */
  nav{display:flex;gap:8px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;font-family:var(--mono);font-size:12px;letter-spacing:.02em;
    padding:8px 13px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;
    min-height:38px;
  }
  .chip[aria-selected="true"]{background:var(--accent);border-color:var(--accent);color:#11131c;font-weight:600}

  /* eyebrow + headings */
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:26px 0 6px}
  h1{font-size:26px;line-height:1.15;letter-spacing:-.02em;margin:0 0 8px}
  h2{font-size:19px;letter-spacing:-.01em;margin:0 0 6px}
  p.lead{color:var(--muted);margin:0 0 8px}
  .sub{color:var(--muted);font-size:14px}

  /* card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:14px 0}
  .card h2{margin-bottom:2px}
  .card .why{color:var(--faint);font-size:13px;font-family:var(--mono);margin:0 0 12px}

  /* code */
  pre.code{
    background:#11131c;border:1px solid var(--line);border-radius:10px;
    font-family:var(--mono);font-size:12.5px;line-height:1.7;color:#cdd2e6;
    padding:12px;margin:10px 0;overflow-x:auto;white-space:pre;
  }
  pre.code .cm{color:var(--faint)}
  pre.code .kw{color:var(--accent)}
  pre.code .ok{color:var(--ordered)}

  /* blank chooser */
  .blank{margin:9px 0;border-left:2px solid var(--race);padding-left:10px}
  .blank .q{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--race);text-transform:uppercase;margin-bottom:6px}
  .blank.solved .q{color:var(--ordered)}
  .opt{
    display:block;width:100%;text-align:left;font-family:var(--mono);font-size:12px;line-height:1.55;
    background:#11131c;border:1px solid var(--line);color:#cdd2e6;border-radius:9px;
    padding:10px 11px;margin:7px 0;cursor:pointer;white-space:pre-wrap;
  }
  .opt:active{transform:scale(.995)}
  .opt.correct{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered)}
  .opt.wrong{border-color:var(--race);background:var(--bad-bg);color:var(--race);animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .why-line{font-size:12.5px;color:var(--muted);margin:6px 0 2px;padding-left:10px;border-left:2px solid var(--line)}

  /* spot-the-bug: tappable code lines */
  .scen{font-size:13.5px;color:var(--text);margin:10px 0 2px;padding-left:10px;border-left:2px solid var(--race)}
  .card.solved .scen{border-color:var(--ordered)}
  .bughunt{background:#11131c;border:1px solid var(--line);border-radius:10px;padding:6px;margin:10px 0;overflow:auto;max-height:62vh}
  .bughunt.shake{animation:shake .3s}
  .codeline.blankline{cursor:default;pointer-events:none;min-height:9px}
  .codeline{
    display:flex;gap:10px;width:100%;text-align:left;font-family:var(--mono);font-size:12.5px;line-height:1.7;
    background:transparent;border:1px solid transparent;border-radius:6px;color:#cdd2e6;padding:1px 8px;margin:0;cursor:pointer;
  }
  .codeline:active{transform:scale(.997)}
  .codeline .ln{color:var(--faint);user-select:none;min-width:1.6em;text-align:right;flex:0 0 auto}
  .codeline .src{white-space:pre;flex:1 1 auto}
  .codeline.sel{background:rgba(142,134,240,.16);border-color:var(--accent)}
  .codeline.buggy{background:var(--bad-bg);border-color:var(--race);color:var(--race)}
  .codeline.buggy .ln{color:var(--race)}
  .codeline.miss{border:1px dashed var(--race);opacity:.7}
  .codeline:disabled{cursor:default}

  /* buttons */
  .btn{
    font-family:var(--mono);font-size:13px;letter-spacing:.02em;
    padding:11px 15px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);cursor:pointer;min-height:44px;
  }
  .btn.go{background:var(--accent);border-color:var(--accent);color:#11131c;font-weight:600}
  .btn:disabled{opacity:.4;cursor:default}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}

  /* console */
  .console{
    font-family:var(--mono);font-size:12px;line-height:1.65;background:#0d0f17;
    border:1px solid var(--line);border-radius:10px;padding:11px;margin-top:10px;
    white-space:pre-wrap;min-height:20px;color:#aeb4cf;
  }
  .console .pass{color:var(--ordered)}
  .console .fail{color:var(--race)}

  /* done badge */
  .done{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ordered);letter-spacing:.04em}
  .done.hidden{display:none}

  /* quiz / flashcard */
  .qopt{display:block;width:100%;text-align:left;font-size:14px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px;margin:7px 0;cursor:pointer;min-height:44px}
  .qopt.correct{border-color:var(--ordered);background:var(--ok-bg)}
  .qopt.wrong{border-color:var(--race);background:var(--bad-bg)}
  .flash{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;min-height:120px;cursor:pointer;display:flex;flex-direction:column;justify-content:center}
  .flash .face{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .flash .body{font-size:15.5px}
  .flash.back .face{color:var(--ordered)}

  /* simulator */
  .ctrls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:10px 0}
  .ctrl{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .ctrl input[type=range]{vertical-align:middle;width:120px;accent-color:var(--accent)}
  .toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:12px;min-height:38px}
  .switch{width:42px;height:24px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);position:relative;transition:background .2s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
  .toggle.on .switch{background:var(--ordered)}
  .toggle.on .switch::after{transform:translateX(18px);background:#11131c}
  .tape{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0}
  .step{font-family:var(--mono);font-size:10.5px;padding:4px 6px;border-radius:6px;border:1px solid var(--line);background:#11131c}
  .result{font-family:var(--mono);font-size:13px;margin-top:8px;padding:11px;border-radius:10px;border:1px solid var(--line)}
  .result.lost{border-color:var(--race);background:var(--bad-bg);color:var(--race)}
  .result.exact{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered)}

  footer{color:var(--faint);font-size:12px;text-align:center;padding:30px 0 40px;font-family:var(--mono)}
  footer .credit{display:block;margin-bottom:14px}
  .resetbtn{
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint);
    background:transparent;border:1px solid var(--line);border-radius:8px;
    padding:8px 13px;cursor:pointer;min-height:36px;
  }
  .resetbtn:hover,.resetbtn:active{color:var(--race);border-color:var(--race)}
  a{color:var(--accent)}

  /* lesson <-> skill cross-links */
  .xlinkrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .xlink{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;min-height:34px;line-height:1.35;text-align:left}
  .xlink:hover,.xlink:active{border-color:var(--accent);background:#171a27}
  .xlink b{color:var(--text);font-weight:600}
  .xlink .dot{color:var(--ordered)}
  .xlink small{color:var(--faint);font-size:11px}

  /* lessons */
  .lesson p{color:var(--muted);font-size:14.5px;margin:11px 0}
  .lesson p.big{font-size:15.5px;color:var(--text);margin-top:2px}
  .lesson b.hl{color:var(--text)}
  .lesson code{font-family:var(--mono);font-size:12px;background:#11131c;border:1px solid var(--line);border-radius:6px;padding:1px 5px;color:#cdd2e6}
  .diagram{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0}
  .dcols{display:flex;gap:14px;flex-wrap:wrap}
  .dcol{flex:1;min-width:130px}
  .dlabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .dnote{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.65}
  .chip2{display:inline-block;font-family:var(--mono);font-size:11.5px;padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:#11131c;color:#cdd2e6;margin:3px 3px 3px 0}
  .chip2.micro{border-color:var(--ordered);color:var(--ordered)}
  .chip2.macro{border-color:var(--race);color:var(--race)}
  .chip2.sync{border-color:var(--accent);color:var(--accent)}
  .stackcol{display:flex;flex-direction:column-reverse;gap:5px}
  .frame{font-family:var(--mono);font-size:11.5px;background:#11131c;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:6px 9px;color:#cdd2e6}
  .qbox{border:1px dashed var(--line);border-radius:8px;padding:9px;margin-top:8px}
  .qbox.micro{border-color:rgba(87,224,176,.45)}
  .qbox.macro{border-color:rgba(255,154,107,.45)}
  .lanes{display:grid;grid-template-columns:auto 1fr;gap:6px 10px;align-items:center;font-family:var(--mono);font-size:11.5px}
  .lanehead{color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-size:9.5px}
  .lstep{background:#11131c;border:1px solid var(--line);border-radius:6px;padding:6px 9px;color:#cdd2e6}
  .lstep.bad{border-color:var(--race);color:var(--race);background:var(--bad-bg)}
  .lstep.good{border-color:var(--ordered);color:var(--ordered);background:var(--ok-bg)}
  .lstep.wait{color:var(--faint);border-style:dashed}
  .flowarrow{text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px;margin:8px 0}
  .memcell{display:inline-flex;align-items:center;justify-content:center;min-width:50px;height:42px;padding:0 8px;border:1px solid var(--accent);border-radius:8px;font-family:var(--mono);font-size:16px;color:var(--text);background:#11131c}
  .threadbox{flex:1;min-width:96px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.5}
  .permits{display:flex;gap:6px}
  .permit{width:22px;height:22px;border-radius:6px;border:1px solid var(--ordered);background:var(--ok-bg)}
  .permit.used{border-color:var(--line);background:#11131c}
  .histtape{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  /* paired reference implementation inside a lesson */
  .impl{border-left:2px solid var(--accent);padding-left:12px;margin:16px 0 6px}
  .impl .dlabel{color:var(--accent);margin-bottom:6px}
  .impl pre.code{margin:0}
  /* entity stage: producer / queue / consumer boxes with flowing items */
  .estage{display:block;margin:4px auto 2px}
  .ecap{fill:none}
  .pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* lesson animations: .seq items reveal in --i order once .anim gets .playing */
  .anim.playing .seq{animation:seqin .5s ease both;animation-delay:calc(var(--i,0) * var(--step,.6s))}
  .anim.playing .seq.pop{animation:seqpop .52s ease both;animation-delay:calc(var(--i,0) * var(--step,.6s))}
  @keyframes seqin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:none}}
  @keyframes seqpop{0%{opacity:0;transform:scale(.9)}60%{transform:scale(1.06)}100%{opacity:1;transform:none}}
  .spin{display:inline-block;animation:spin 3.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .playbtn{font-family:var(--mono);font-size:12px;letter-spacing:.02em;padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);color:var(--text);cursor:pointer;min-height:36px;margin-top:2px}
  .playbtn:active{transform:scale(.97)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>

<header>
  <div class="wrap">
    <div class="hbar">
      <div class="brand"><b>Concurrency Bootcamp</b><span class="tick">// single thread, many turns</span></div>
      <div class="prog">drills&nbsp;<span class="n" id="pn">0</span>/<span id="pt">8</span></div>
    </div>
    <div class="bar"><i id="progbar"></i></div>
    <nav id="nav"></nav>
  </div>
</header>

<main class="wrap" id="main"></main>
<footer>
  <span class="credit">built for thumb-driving on a phone · every drill runs real JS in your browser</span>
  <button class="resetbtn" id="resetbtn" type="button">reset progress</button>
</footer>

<script>
"use strict";

/* ---------- tiny helpers available to demos ---------- */
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
function deferred(){ let resolve,reject; const promise=new Promise((res,rej)=>{resolve=res;reject=rej;}); return {promise,resolve,reject}; }
const rnd = (n) => Math.floor(Math.random()*n);

/* ===========================================================
   REFERENCE IMPLEMENTATIONS  (these power the Run buttons)
   =========================================================== */
class Mutex{
  #locked=false; #queue=[];
  async acquire(){ if(!this.#locked){this.#locked=true;return;} const d=deferred(); this.#queue.push(d); await d.promise; }
  release(){ const n=this.#queue.shift(); if(n) n.resolve(); else this.#locked=false; }
  async runExclusive(fn){ await this.acquire(); try{ return await fn(); } finally{ this.release(); } }
}
class Semaphore{
  #permits; #queue=[];
  constructor(p){ this.#permits=p; }
  async acquire(){ if(this.#permits>0){this.#permits--;return;} const d=deferred(); this.#queue.push(d); await d.promise; }
  release(){ const n=this.#queue.shift(); if(n) n.resolve(); else this.#permits++; }
}
class Latch{ #d=deferred(); wait(){return this.#d.promise;} open(){this.#d.resolve();} }
class Barrier{
  #parties; #count=0; #d=deferred();
  constructor(p){ this.#parties=p; }
  async arrive(label){ if(++this.#count===this.#parties) this.#d.resolve(); await this.#d.promise; return label; }
}
class AsyncQueue{
  #values=[]; #waiters=[];
  push(v){ const w=this.#waiters.shift(); if(w) w.resolve(v); else this.#values.push(v); }
  async pull(){ if(this.#values.length) return this.#values.shift(); const d=deferred(); this.#waiters.push(d); return d.promise; }
}
class Sequencer{
  #next=0; #gates=new Map();
  acquire(seq){ if(seq<=this.#next) return Promise.resolve(); return new Promise(res=>this.#gates.set(seq,res)); }
  release(seq){ this.#next=seq+1; const n=this.#gates.get(this.#next); if(n){ this.#gates.delete(this.#next); n(); } }
}
async function pool(items,limit,worker){
  const results=[]; const executing=new Set();
  for(const [i,item] of items.entries()){
    const p=Promise.resolve().then(()=>worker(item,i));
    results.push(p); executing.add(p); p.finally(()=>executing.delete(p));
    if(executing.size>=limit) await Promise.race(executing);
  }
  return Promise.all(results);
}
class TokenBucket{
  #capacity; #tokens; #ratePerMs; #last=Date.now();
  constructor(capacity,ratePerSec){ this.#capacity=capacity; this.#tokens=capacity; this.#ratePerMs=ratePerSec/1000; }
  #refill(){ const now=Date.now(); const gained=(now-this.#last)*this.#ratePerMs; this.#last=now; this.#tokens=Math.min(this.#capacity,this.#tokens+gained); }
  async take(){ this.#refill(); while(this.#tokens<1){ await sleep((1-this.#tokens)/this.#ratePerMs); this.#refill(); } this.#tokens-=1; }
}
function debounce(fn,wait){
  let t;                                  // the pending timer
  return function(...args){
    clearTimeout(t);                      // cancel the prior pending call
    t=setTimeout(()=>fn.apply(this,args),wait);
  };
}
function throttle(fn,interval){
  let last=0;
  return function(...args){
    const now=Date.now();
    if(now-last>=interval){ last=now; fn.apply(this,args); }
  };
}
function promiseAll(promises){
  return new Promise((resolve,reject)=>{
    const results=[]; let done=0;
    if(promises.length===0) resolve(results);
    promises.forEach((p,i)=>{
      Promise.resolve(p).then(v=>{ results[i]=v; if(++done===promises.length) resolve(results); }, reject);
    });
  });
}
async function retry(fn,{tries=3,base=10}={}){
  let attempt=0;
  for(;;){
    try{ return await fn(); }
    catch(err){
      if(++attempt>=tries) throw err;
      await sleep(base*2**(attempt-1));   // exponential backoff
    }
  }
}
/* ---- durable-execution helpers (replay determinism, durable timeout, condition) ---- */
function makeRuntime(history){
  let cursor=0;
  return {
    // first run: execute fn and record it. replay: return the recorded value verbatim.
    sideEffect(fn){
      if(cursor<history.length) return history[cursor++];
      const v=fn(); history.push(v); cursor++; return v;
    }
  };
}
function withTimeout(work,ms){
  return Promise.race([                          // first to settle wins
    work,
    sleep(ms).then(()=>({timedOut:true})),
  ]);
}
function makeCondition(){
  let waiters=[];
  return {
    notify(){ const w=waiters; waiters=[]; w.forEach(r=>r()); },
    async wait(pred){ while(!pred()){ const d=deferred(); waiters.push(d.resolve); await d.promise; } }
  };
}
function select(sources){
  // race tagged sources; resolve with {label,value} of whichever settles first
  return Promise.race(sources.map(s=>s.promise.then(v=>({label:s.label,value:v}))));
}
function memoizeAsync(fn){
  const cache=new Map();   // key -> in-flight or settled promise
  return (key)=>{
    if(cache.has(key)) return cache.get(key);                 // share the existing computation
    const p=fn(key).catch(e=>{ cache.delete(key); throw e; }); // evict on failure
    cache.set(key,p);
    return p;
  };
}
class BoundedQueue{
  #cap; #buf=[]; #pushW=[]; #pullW=[];
  constructor(cap){ this.#cap=cap; }
  async push(v){
    while(this.#buf.length>=this.#cap){ const d=deferred(); this.#pushW.push(d); await d.promise; }   // block while full
    this.#buf.push(v);
    const w=this.#pullW.shift(); if(w) w.resolve();      // wake a waiting consumer
  }
  async pull(){
    while(this.#buf.length===0){ const d=deferred(); this.#pullW.push(d); await d.promise; }           // block while empty

class RWLock{

  async acquireRead(){ if(this.#writing||this.#wq.length){ const d=deferred(); this.#rq.push(d); await d.promise; } else this.#readers++; }
  releaseRead(){ this.#readers--; this.#dispatch(); }
  async acquireWrite(){ if(this.#writing||this.#readers>0||this.#wq.length){ const d=deferred(); this.#wq.push(d); await d.promise; } else this.#writing=true; }
  releaseWrite(){ this.#writing=false; this.#dispatch(); }
  #dispatch(){
    if(this.#writing) return;
    if(this.#readers===0 && this.#wq.length){ this.#writing=true; this.#wq.shift().resolve(); }
    else if(!this.#wq.length){ while(this.#rq.length){ this.#readers++; this.#rq.shift().resolve(); } }
  }

function withTimeoutCancel(workFn,ms){

/* ---- flashcards ---- */
const CARDS = [
  ["When is spinning a thread the wrong call?","Per-unit work is tiny (~1ms). Spawn + message-passing + serialization cost dwarfs the work. Threads pay off only for CPU-bound work big enough to amortize them."],
  ["I/O-bound vs CPU-bound — which wants workers?","CPU-bound wants workers (genuine parallel compute). I/O-bound is better single-threaded async: you're waiting, not computing, so a thread just sits idle."],
  ["Where do data races actually exist in JS?","Only across worker_threads / Web Workers sharing a SharedArrayBuffer. Single-threaded run-to-completion rules them out everywhere else."],
  ["What does strict ordering cost you?","Availability. A stalled producer blocks everyone behind it. Ordering trades availability for consistency — recognize the trade before it bites you."],
  ["Unbounded retry against a dead dependency?","An unbounded backlog. Robustness isn't free: cap retries, add a circuit breaker or dead-letter path, and bound the queue."],
  ["Why Atomics.add over view[0]++ across threads?","view[0]++ is read-modify-write — three steps that interleave and lose updates. Atomics.add is one indivisible step."],
  ["Why can't a durable workflow call Date.now() or Math.random() directly?","Workflow code is re-executed from history on replay to rebuild state. Wall-clock and randomness differ each run, so replay would diverge from history. Route them through the runtime (workflow time, sideEffect) so the recorded value replays exactly."],
  ["A long-running workflow's event history keeps growing — then what?","History is replayed on every wake, so unbounded history means unbounded replay cost and a hard size cap. continue-as-new starts a fresh execution, carrying state forward with an empty history — the same instinct as capping a queue."],
  ["An activity ran, then the worker died before its result was recorded. Does it run again?","Yes — execution is at-least-once, so an activity can run more than once. Make activities idempotent (dedupe by a stable key) so a retry doesn't double-charge."],
  ["Two signals hit a running workflow at once — is its state safe?","Handlers are coroutines on one thread: no mid-statement preemption, but they interleave at every await. A read-modify-write spanning an await needs a mutex — the same hazard as any async critical section."],
  ["Condition variable: why `while (!ready) wait()` and never `if`?","Spurious wakeups and multiple waiters. A waiter can wake while the predicate is still false (another waiter consumed the change, or a bare wake). Re-check the predicate in a loop, not with a one-time `if`."],
  ["How do atomics implement a lock?","A lock sits on an atomic compare-and-swap: in one indivisible step, test 'is it 0?' and set it to 1. Win the CAS and you hold the lock; lose and you wait/retry. Atomics are the primitive beneath mutexes and semaphores."],
  ["Bounded vs unbounded queue?","Unbounded hides backpressure: a fast producer grows the backlog until memory dies. A bounded queue blocks the producer when full, pushing the slowdown back to the source — capacity IS the flow control."],
  ["Wait for N concurrent tasks to finish — how?","`await Promise.all([...])` resolves once every task settles (use `Promise.allSettled` to get results even when some reject). This barrier is 'all done' — distinct from a rendezvous barrier, which is 'all start together'."],
  ["Blocking vs non-blocking vs async, one line each?","Blocking: stop the thread until ready. Non-blocking: return now with success-or-not, caller retries. Async: hand off, keep going, get a callback later. You're trading thread-cost ↔ control ↔ throughput."],
  ["Thread pool / executor — the JS equivalent?","Bound parallelism with a concurrency pool: launch tasks up to a limit, then `await Promise.race(inFlight)` to free a slot before starting the next. Each task is just a promise you await — promises are JS's futures."],
  ["Wait on whichever of several async sources is ready first?","Tag each source, then `Promise.race` them — the first to settle wins and you know which. (A true channel-select also avoids consuming the losers; race alone doesn't.)"],
];

/* ===========================================================
   STATE + PERSISTENCE
   =========================================================== */
const TOTAL = DRILLS.primitives.length + DRILLS.bank.length + DRILLS.toolkit.length + DRILLS.durable.length + BUGHUNT.length;
let state = { module:"learn", solved:{} };

/* one-at-a-time stepping: where we are inside each stepped module */
let learnIdx = 0;                                          // current lesson chapter
let modelIdx = 0;                                          // current quiz question
let bugIdx = 0;                                            // current spot-the-bug card
let test = { on:false, qs:[], idx:0, score:0, answered:false };  // scored test mode
let drillIdx = { primitives:0, bank:0, toolkit:0, durable:0 };  // current drill per module
let quizDone = {};                                         // qi -> answered correctly (in-memory)

const STORAGE_KEY="cbootcamp:solved";
const POSITION_KEY="cbootcamp:position";   // where the user left off (lessons + skills)
function loadProgress(){
  // skills pieces: which drills are solved
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) state.solved=JSON.parse(raw); }
  catch(e){ /* private mode / blocked storage -> stay in-memory */ }
  // lessons + skills progress: resume where the user left off
  try{
    const raw=localStorage.getItem(POSITION_KEY);
    if(raw){
      const p=JSON.parse(raw);
      if(typeof p.module==="string" && MODULES.some(m=>m.id===p.module)) state.module=p.module;
      if(Number.isInteger(p.learnIdx)) learnIdx=p.learnIdx;
      if(Number.isInteger(p.modelIdx)) modelIdx=p.modelIdx;
      if(Number.isInteger(p.bugIdx)) bugIdx=p.bugIdx;
      if(p.drillIdx && typeof p.drillIdx==="object") Object.assign(drillIdx, p.drillIdx);
      if(p.quizDone && typeof p.quizDone==="object") quizDone=p.quizDone;
    }
  }catch(e){ /* blocked storage -> stay in-memory */ }
  renderProgress();
}
function saveProgress(){
  renderProgress();
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state.solved)); }catch(e){}
}
// persist the user's place across lessons + skills so they resume on return
function savePosition(){
  try{ localStorage.setItem(POSITION_KEY,JSON.stringify({
    module: state.module, learnIdx, modelIdx, bugIdx, drillIdx, quizDone
  })); }catch(e){}
}
// wipe everything: solved drills, quiz answers, and where the user left off
function resetProgress(){
  if(!confirm("Reset all progress? This clears solved drills, quiz answers, and your place in every module.")) return;
  try{ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(POSITION_KEY); }catch(e){}
  state.solved={}; quizDone={};
  learnIdx=0; modelIdx=0; bugIdx=0;
  drillIdx={ primitives:0, bank:0, toolkit:0, durable:0 };
  test={ on:false, qs:[], idx:0, score:0, answered:false };
  state.module="learn";
  renderProgress(); render(); window.scrollTo({top:0});
}
function renderProgress(){
  const n=Object.keys(state.solved).length;
  document.getElementById("pn").textContent=n;
  document.getElementById("pt").textContent=TOTAL;
  document.getElementById("progbar").style.width=(100*n/TOTAL)+"%";
}

/* ===========================================================
   RENDER
   =========================================================== */
const main=document.getElementById("main");
const nav=document.getElementById("nav");

function renderNav(){
  nav.innerHTML="";
  MODULES.forEach(m=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=m.label; b.setAttribute("role","tab");
    b.setAttribute("aria-selected", state.module===m.id ? "true":"false");
    b.onclick=()=>{ state.module=m.id; render(); window.scrollTo({top:0}); };
    nav.appendChild(b);
  });
}

function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstElementChild; }

function render(){
  savePosition();
  renderNav();
  main.innerHTML="";
  const m=MODULES.find(x=>x.id===state.module);
  if(m.type==="learn") renderLearn();
  else if(m.type==="lesson") renderModel();
  else if(m.type==="drills") renderDrills(state.module);
  else if(m.type==="sim") renderSim();
  else if(m.type==="cards") renderCards();
  else if(m.type==="bugs") renderBugHunt();
  else if(m.type==="test") renderTest();
}

/* ---- one-at-a-time stepper control (prev · n/total · next) ---- */
function stepperRow(idx, total, go){
  const row=el(`<div class="row" style="justify-content:space-between;align-items:center;margin-top:14px"></div>`);
  const prev=el(`<button class="btn">‹ prev</button>`);
  const pos=el(`<span class="ctrl">${idx+1} / ${total}</span>`);
  const next=el(`<button class="btn go">next ›</button>`);
  if(idx===0) prev.disabled=true;
  if(idx===total-1) next.disabled=true;
  prev.onclick=()=>go(idx-1);
  next.onclick=()=>go(idx+1);
  row.append(prev,pos,next);
  return row;
}

/* ---- lessons: illustrated primer, one chapter at a time ---- */
const LESSONS = [
  { eb:"lesson 01 · the model", title:"One thread, many turns", html:`
    <p class="big">JavaScript runs your code on <b class="hl">one thread</b>. There's a single call stack, and a function runs to completion before anything else gets a turn — it is never interrupted mid-statement.</p>
    <p>So how does it juggle timers, clicks, and network calls at once? It <b class="hl">defers</b> them. That work doesn't run inline — it's queued and picked up later by the <b class="hl">event loop</b>, which runs one piece at a time in the gaps between your synchronous blocks.</p>
    <div class="diagram anim">
      <div class="dlabel">the runtime &middot; watch one turn of the loop</div>
      <svg class="elsvg" viewBox="0 0 320 214" width="100%" style="max-width:344px;display:block;margin:6px auto 0" font-family="ui-monospace,monospace">
        <path d="M 78 170 L 160 42 L 242 170 L 78 170 Z" fill="none" stroke="#2c3350" stroke-width="1.5" stroke-dasharray="4 5"/>

        <text x="160" y="39" fill="#8e86f0" font-size="9" text-anchor="middle">CALL STACK</text>

        <rect x="8" y="170" width="124" height="40" rx="8" fill="#11131c" stroke="#ff9a6b"/>
        <text x="70" y="187" fill="#ff9a6b" font-size="9" text-anchor="middle">MACROTASKS</text>
        <text x="70" y="201" fill="#cdd2e6" font-size="9" text-anchor="middle">take one</text>
        <rect x="188" y="170" width="124" height="40" rx="8" fill="#11131c" stroke="#57e0b0"/>
        <text x="250" y="187" fill="#57e0b0" font-size="9" text-anchor="middle">MICROTASKS</text>
        <text x="250" y="201" fill="#cdd2e6" font-size="9" text-anchor="middle">drain all</text>
        <circle r="7.5" fill="#8e86f0" stroke="#11131c" stroke-width="1.5">
          <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
            keyTimes="0;0.30;0.42;0.72;0.84;1" keyPoints="0;0.326;0.326;0.651;0.651;1"
            path="M 78 170 L 160 42 L 242 170 L 78 170 Z"/>
        </circle>
      </svg>
      <div class="dnote seq" style="--i:0"><span class="spin" style="color:var(--accent)">&#8635;</span> <b style="color:var(--accent)">event loop:</b> take <b style="color:var(--race)">one</b> macrotask &rarr; run the stack to empty &rarr; drain <b style="color:var(--ordered)">all</b> microtasks &rarr; repeat.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p>Two queues feed that loop, and they aren't equal. <b class="hl">Macrotasks</b> — <code>setTimeout</code>, I/O and message callbacks — are taken one per turn. <b class="hl">Microtasks</b> — promise reactions and <code>await</code> continuations — are drained <i>completely</i> after each macrotask, before the next one runs. That's the rule the whole next chapter builds on.</p>
    <div class="impl">
      <div class="dlabel">reference implementation &middot; the loop the runtime runs for you</div>
      <pre class="code">const macrotasks = [];   <span class="cm">// setTimeout, I/O, message callbacks</span>
const microtasks = [];   <span class="cm">// .then / await continuations, queueMicrotask</span>

function turn() {
  const task = macrotasks.shift();   <span class="cm">// 1. take exactly ONE macrotask</span>
  if (task) task();                  <span class="cm">// 2. run it start-to-finish (never interrupted)</span>
  while (microtasks.length)          <span class="cm">// 3. then drain EVERY microtask</span>
    microtasks.shift()();            <span class="cm">//    (new ones enqueued here run too)</span>
}
<span class="cm">// the runtime calls turn() forever — that is the event loop</span></pre>
    </div>
    <p><b class="hl">Why it matters:</b> because a block can't be interrupted, ordinary synchronous code is safe from torn reads — no lock needed. But the instant you <code>await</code>, step 2 ends and you hand the thread back. That gap is where the ordering surprises and the races in the next chapters live.</p>` },

  { eb:"lesson 02 · the model", title:"Microtasks beat macrotasks", html:`
    <p class="big">Deferred work isn't one queue. After each macrotask, the loop drains the <b class="hl">entire</b> microtask queue before it touches the next macrotask.</p>
    <p><b class="hl">Microtasks</b> are promise reactions — <code>.then</code>, <code>await</code> continuations, <code>queueMicrotask</code>. <b class="hl">Macrotasks</b> are <code>setTimeout</code>, message and I/O callbacks. Microtasks always cut the line.</p>

      <pre class="code" style="margin:0 0 12px">console.log('A');                        <span class="cm">// sync</span>
setTimeout(() =&gt; console.log('B'));       <span class="cm">// macro</span>

console.log('D');                        <span class="cm">// sync</span></pre>
      <div class="histtape">

    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p>The reason is step 3 of the loop: it drains microtasks to <b class="hl">exhaustion</b>. If a microtask enqueues another microtask, that one runs in the same drain — the queue only has to be empty <i>once</i> for the loop to move on to the next macrotask. So a chain that keeps re-queuing itself never lets a timer run.</p>
    <div class="impl">
      <div class="dlabel">reference implementation &middot; a microtask chain starves a timer</div>
      <pre class="code">setTimeout(() =&gt; console.log('timer'));   <span class="cm">// macrotask — waits its turn</span>

let n = 0;
(function loop() {
  if (n++ &lt; 1000)
    Promise.resolve().then(loop);         <span class="cm">// re-queues a MICROtask each time</span>
})();

<span class="cm">// all 1000 microtasks drain before 'timer' ever runs:</span>
<span class="cm">// the microtask queue never reaches empty, so step 3 never finishes</span></pre>
    </div>
    <p><b class="hl">Why it matters:</b> this is exactly how a runaway promise chain can freeze timers and rendering. Knowing the drain order — sync, then all microtasks, then one macrotask — is how you predict, and debug, any async sequence.</p>` },
