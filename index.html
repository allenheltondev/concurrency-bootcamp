<style>

  .flash .body{font-size:15.5px}
  .flash.back .face{color:var(--ordered)}

  /* simulator */
  .ctrls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:10px 0}
  .ctrl{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .ctrl input[type=range]{vertical-align:middle;width:120px;accent-color:var(--accent)}
  .toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:12px;min-height:38px}
  .switch{width:42px;height:24px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);position:relative;transition:background .2s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
  .toggle.on .switch{background:var(--ordered)}
  .toggle.on .switch::after{transform:translateX(18px);background:#11131c}
  .tape{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0}
  .step{font-family:var(--mono);font-size:10.5px;padding:4px 6px;border-radius:6px;border:1px solid var(--line);background:#11131c}
  .result{font-family:var(--mono);font-size:13px;margin-top:8px;padding:11px;border-radius:10px;border:1px solid var(--line)}
  .result.lost{border-color:var(--race);background:var(--bad-bg);color:var(--race)}
  .result.exact{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered)}

  footer{color:var(--faint);font-size:12px;text-align:center;padding:30px 0 40px;font-family:var(--mono)}
  a{color:var(--accent)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

      <div class="brand"><b>Concurrency Bootcamp</b><span class="tick">// single thread, many turns</span></div>

<script>
"use strict";

/* ---------- tiny helpers available to demos ---------- */
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
function deferred(){ let resolve,reject; const promise=new Promise((res,rej)=>{resolve=res;reject=rej;}); return {promise,resolve,reject}; }
const rnd = (n) => Math.floor(Math.random()*n);

/* ===========================================================
   REFERENCE IMPLEMENTATIONS  (these power the Run buttons)
   =========================================================== */
class Mutex{
  #locked=false; #queue=[];
  async acquire(){ if(!this.#locked){this.#locked=true;return;} const d=deferred(); this.#queue.push(d); await d.promise; }
  release(){ const n=this.#queue.shift(); if(n) n.resolve(); else this.#locked=false; }
  async runExclusive(fn){ await this.acquire(); try{ return await fn(); } finally{ this.release(); } }
}
class Semaphore{
  #permits; #queue=[];
  constructor(p){ this.#permits=p; }
  async acquire(){ if(this.#permits>0){this.#permits--;return;} const d=deferred(); this.#queue.push(d); await d.promise; }
  release(){ const n=this.#queue.shift(); if(n) n.resolve(); else this.#permits++; }
}
class Latch{ #d=deferred(); wait(){return this.#d.promise;} open(){this.#d.resolve();} }
class Barrier{
  #parties; #count=0; #d=deferred();
  constructor(p){ this.#parties=p; }
  async arrive(label){ if(++this.#count===this.#parties) this.#d.resolve(); await this.#d.promise; return label; }
}
class AsyncQueue{
  #values=[]; #waiters=[];
  push(v){ const w=this.#waiters.shift(); if(w) w.resolve(v); else this.#values.push(v); }
  async pull(){ if(this.#values.length) return this.#values.shift(); const d=deferred(); this.#waiters.push(d); return d.promise; }
}
class Sequencer{
  #next=0; #gates=new Map();
  acquire(seq){ if(seq<=this.#next) return Promise.resolve(); return new Promise(res=>this.#gates.set(seq,res)); }
  release(seq){ this.#next=seq+1; const n=this.#gates.get(this.#next); if(n){ this.#gates.delete(this.#next); n(); } }
}
async function pool(items,limit,worker){
  const results=[]; const executing=new Set();
  for(const [i,item] of items.entries()){
    const p=Promise.resolve().then(()=>worker(item,i));
    results.push(p); executing.add(p); p.finally(()=>executing.delete(p));
    if(executing.size>=limit) await Promise.race(executing);
  }
  return Promise.all(results);
}
class TokenBucket{
  #capacity; #tokens; #ratePerMs; #last=Date.now();
  constructor(capacity,ratePerSec){ this.#capacity=capacity; this.#tokens=capacity; this.#ratePerMs=ratePerSec/1000; }
  #refill(){ const now=Date.now(); const gained=(now-this.#last)*this.#ratePerMs; this.#last=now; this.#tokens=Math.min(this.#capacity,this.#tokens+gained); }
  async take(){ this.#refill(); while(this.#tokens<1){ await sleep((1-this.#tokens)/this.#ratePerMs); this.#refill(); } this.#tokens-=1; }
}
function debounce(fn,wait){
  let t;                                  // the pending timer
  return function(...args){
    clearTimeout(t);                      // cancel the prior pending call
    t=setTimeout(()=>fn.apply(this,args),wait);
  };
}
function throttle(fn,interval){
  let last=0;
  return function(...args){
    const now=Date.now();
    if(now-last>=interval){ last=now; fn.apply(this,args); }
  };
}
function promiseAll(promises){
  return new Promise((resolve,reject)=>{
    const results=[]; let done=0;
    if(promises.length===0) resolve(results);
    promises.forEach((p,i)=>{
      Promise.resolve(p).then(v=>{ results[i]=v; if(++done===promises.length) resolve(results); }, reject);
    });
  });
}
async function retry(fn,{tries=3,base=10}={}){
  let attempt=0;
  for(;;){
    try{ return await fn(); }
    catch(err){
      if(++attempt>=tries) throw err;
      await sleep(base*2**(attempt-1));   // exponential backoff
    }
  }
}

/* ===========================================================
   DEMOS  -> return {lines:[{t,cls}], pass:boolean}
   =========================================================== */
async function demoMutex(){
  const m=new Mutex(); let inside=0,max=0;
  await Promise.all([1,2,3,4,5].map(()=>m.runExclusive(async()=>{inside++;max=Math.max(max,inside);await sleep(rnd(18));inside--;})));
  return {lines:[{t:`5 tasks ran through one lock`},{t:`max concurrent holders = ${max}`}], pass:max===1, verdict:`max holders ${max} (want 1)`};
}
async function demoSemaphore(){
  const s=new Semaphore(2); let inside=0,max=0;
  await Promise.all([1,2,3,4,5,6].map(async()=>{await s.acquire();inside++;max=Math.max(max,inside);await sleep(rnd(18));inside--;s.release();}));
  return {lines:[{t:`6 tasks, 2 permits`},{t:`max concurrent = ${max}`}], pass:max===2, verdict:`max concurrent ${max} (want 2)`};
}
async function demoLatch(){
  const l=new Latch(); const order=[];
  const w=[1,2,3].map(n=>l.wait().then(()=>order.push("released-"+n)));
  order.push("all-waiting"); await sleep(12); l.open(); await Promise.all(w);
  const pass=order[0]==="all-waiting"&&order.length===4;
  return {lines:[{t:order.join("  ")}], pass, verdict:pass?"all waited, then released together":"order wrong"};
}
async function demoBarrier(){
  const b=new Barrier(3); const log=[];
  const ps=[8,28,14].map((d,i)=>sleep(d).then(()=>{log.push("arrive-"+i);return b.arrive(i).then(()=>log.push("go-"+i));}));
  await Promise.all(ps);
  const firstGo=log.findIndex(x=>x.startsWith("go"));
  const pass=log.slice(0,firstGo).every(x=>x.startsWith("arrive"))&&firstGo===3;
  return {lines:[{t:log.join("  ")}], pass, verdict:pass?"all 3 arrived before any proceeded":"a party left early"};
}
async function demoQueue(){
  const q=new AsyncQueue(); const got=[];
  const c=(async()=>{for(let i=0;i<3;i++)got.push(await q.pull());})();
  await sleep(10); q.push("a"); await sleep(6); q.push("b"); q.push("c"); await c;
  const pass=got.join(",")==="a,b,c";
  return {lines:[{t:`consumer pulled: [${got.join(", ")}]`},{t:`(it blocked until each push arrived)`}], pass, verdict:pass?"delivered in order, no busy-wait":"out of order"};
}
async function demoSequencer(){
  const seq=new Sequencer(); const out=[]; const pos={A:0,B:1,C:2}; const cyc={A:0,B:0,C:0};
  const emit=async(slot)=>{const s=cyc[slot]++*3+pos[slot]; await seq.acquire(s); out.push(slot); seq.release(s);};
  const prod=slot=>(async()=>{for(let c=0;c<4;c++){await sleep(rnd(10));await emit(slot);}})();
  await Promise.all([prod("A"),prod("B"),prod("C")]);
  const pass=out.join("")==="ABCABCABCABC";
  return {lines:[{t:`emitted: ${out.join(" ")}`},{t:`(3 producers fired in random order)`}], pass, verdict:pass?"perfect A→B→C every cycle":"order broke"};
}
async function demoPrintOrder(){ return demoSequencer(); }
async function demoPool(){
  let inflight=0,max=0;
  await pool([1,2,3,4,5,6],2,async()=>{inflight++;max=Math.max(max,inflight);await sleep(rnd(18));inflight--;});
  return {lines:[{t:`6 jobs, limit 2`},{t:`max in-flight = ${max}`}], pass:max===2, verdict:`max in-flight ${max} (want 2)`};
}
async function demoDining(){
  const n=5, rounds=2;
  const fork=Array.from({length:n},()=>new Mutex());
  let meals=0;
  const seat=async(i)=>{
    const left=i, right=(i+1)%n;
    const [a,b]= left<right ? [left,right] : [right,left];   // global lock order
    for(let r=0;r<rounds;r++){
      await fork[a].acquire(); await fork[b].acquire();
      try{ meals++; await sleep(rnd(6)); } finally{ fork[b].release(); fork[a].release(); }
    }
  };
  await Promise.all(Array.from({length:n},(_,i)=>seat(i)));
  const pass=meals===n*rounds;
  return {lines:[{t:`${n} philosophers, ${rounds} rounds each`},{t:`${meals} meals served — ran to completion`}], pass, verdict:pass?`all ${meals} meals served, no deadlock`:`stalled at ${meals}/${n*rounds}`};
}
async function demoTokenBucket(){
  const cap=3, ratePerSec=100;            // ~1 token / 10ms once the burst is spent
  const tb=new TokenBucket(cap,ratePerSec);
  const start=Date.now(); const at=[];
  for(let i=0;i<6;i++){ await tb.take(); at.push(Date.now()-start); }
  const burst=at.filter(t=>t<8).length;   // tokens served effectively instantly
  const total=at[at.length-1];
  const pass = burst===cap && total>=20;
  return {lines:[{t:`bucket: capacity ${cap}, ${ratePerSec}/sec`},{t:`take() at ms: ${at.map(t=>Math.round(t)).join(", ")}`},{t:`${burst} instant (burst), rest throttled`}], pass, verdict:pass?`burst of ${cap}, then steady ~${Math.round(1000/ratePerSec)}ms/token`:`rate-limit broke (burst ${burst}, total ${total}ms)`};
}
async function demoDebounce(){
  let calls=0; const f=debounce(()=>{calls++;},40);
  for(let i=0;i<5;i++){ f(); await sleep(4); }   // burst: 5 calls, ~4ms apart
  await sleep(60);                                // let it settle past wait=40
  const pass=calls===1;
  return {lines:[{t:`5 rapid calls (~4ms apart), wait=40ms`},{t:`fn actually ran ${calls} time(s)`}], pass, verdict:pass?"collapsed a burst into 1 call":`ran ${calls}× (want 1)`};
}
async function demoThrottle(){
  let calls=0; const f=throttle(()=>{calls++;},20);
  for(let i=0;i<10;i++){ f(); await sleep(5); }   // 10 calls over ~50ms
  const pass=calls>=2&&calls<=6;
  return {lines:[{t:`10 calls over ~50ms, interval=20ms`},{t:`fn ran ${calls} time(s)`}], pass, verdict:pass?`throttled to ${calls} (≈ once / 20ms)`:`ran ${calls}× (want ~3)`};
}
async function demoPromiseAll(){
  const mk=(v,ms)=>new Promise(r=>setTimeout(()=>r(v),ms));
  const out=await promiseAll([mk("a",18),mk("b",2),mk("c",10)]);
  const pass=out.join(",")==="a,b,c";
  return {lines:[{t:`resolved [a@18ms, b@2ms, c@10ms]`},{t:`result: [${out.join(", ")}]`}], pass, verdict:pass?"input order preserved despite finish order":`got [${out.join(", ")}]`};
}
async function demoRetry(){
  let n=0; const flaky=async()=>{ if(++n<3) throw new Error("fail "+n); return "ok@"+n; };
  const t0=Date.now();
  const r=await retry(flaky,{tries:5,base:8});
  const ms=Date.now()-t0;
  const pass=r==="ok@3"&&n===3&&ms>=24;          // backed off 8ms + 16ms before the 3rd try
  return {lines:[{t:`fn fails twice, succeeds on attempt 3`},{t:`got "${r}" after ${n} tries, ~${ms}ms`}], pass, verdict:pass?"backed off 8ms→16ms, then succeeded":`r=${r} n=${n} ${ms}ms`};
}

/* ===========================================================
   CONTENT
   =========================================================== */
const MODULES = [
  { id:"model", label:"the model", type:"lesson" },
  { id:"primitives", label:"primitives", type:"drills" },
  { id:"race", label:"workers & atomics", type:"sim" },
  { id:"tradeoffs", label:"trade-offs", type:"cards" },
  { id:"bank", label:"problem bank", type:"drills" },
  { id:"toolkit", label:"interview kit", type:"drills" },
];

/* ---- model module: predict-output quiz ---- */
const QUIZ = [
  { code:`console.log('A');
setTimeout(() => console.log('B'), 0);
Promise.resolve().then(() => console.log('C'));
console.log('D');`,
    options:["A B C D","A D C B","A D B C"], answer:1,
    why:"Sync first (A, D). Then the microtask queue drains fully (C) before any macrotask. setTimeout (B) is a macrotask, so it runs last." },
  { code:`async function f(){ console.log(1); await null; console.log(3); }
console.log(0);
f();
console.log(2);`,
    options:["0 1 2 3","0 1 3 2","1 0 2 3"], answer:0,
    why:"await null suspends f as a microtask. So f logs 1, yields, the rest of the sync code logs 2, then the microtask resumes and logs 3." },
  { code:`setTimeout(() => console.log('T1'));
Promise.resolve()
  .then(() => console.log('P1'))
  .then(() => console.log('P2'));
setTimeout(() => console.log('T2'));`,
    options:["T1 T2 P1 P2","P1 P2 T1 T2","P1 T1 P2 T2"], answer:1,
    why:"The whole promise chain (P1 then P2) is microtasks and drains before the event loop ever reaches the timer queue (T1, T2)." },
];

/* ---- drill definitions (fill the blank) ---- */
const DRILLS = {
  primitives:[
    { id:"mutex", title:"Mutex", why:"one holder at a time", demo:demoMutex,
      pre:`class Mutex {
  #locked = false;
  #queue = [];
  async acquire() {
    if (!this.#locked) { this.#locked = true; return; }
    const d = deferred();
    this.#queue.push(d);
    await d.promise;          // park until someone hands me the lock
  }
  release() {`,
      blank:{ q:"how should release() pass the lock on?",
        options:[
`    const next = this.#queue.shift();
    if (next) next.resolve();   // hand lock straight to next waiter
    else this.#locked = false;  // nobody waiting -> truly unlock`,
`    this.#locked = false;
    const next = this.#queue.shift();
    if (next) next.resolve();`,
`    const next = this.#queue.shift();
    if (next) next.resolve();`],
        answer:0,
        whys:["Right. The lock is never observably free while a waiter exists — it transfers directly, so no newcomer can slip in between.",
              "This unlocks AND wakes a waiter, so a brand-new acquire() can grab the lock at the same time as the woken one. Two holders.",
              "This never sets #locked = false, so once the queue empties the mutex is stuck locked forever."] },
      post:`  }
}` },

    { id:"semaphore", title:"Semaphore", why:"N permits (a mutex is N = 1)", demo:demoSemaphore,
      pre:`class Semaphore {

  ["I/O-bound vs CPU-bound — which wants workers?","CPU-bound wants workers (genuine parallel compute). I/O-bound is better single-threaded async: you're waiting, not computing, so a thread just sits idle."],
  ["Where do data races actually exist in JS?","Only across worker_threads / Web Workers sharing a SharedArrayBuffer. Single-threaded run-to-completion rules them out everywhere else."],
  ["What does strict ordering cost you?","Availability. A stalled producer blocks everyone behind it. Ordering trades availability for consistency — recognize the trade before it bites you."],
  ["Unbounded retry against a dead dependency?","An unbounded backlog. Robustness isn't free: cap retries, add a circuit breaker or dead-letter path, and bound the queue."],
  ["Why Atomics.add over view[0]++ across threads?","view[0]++ is read-modify-write — three steps that interleave and lose updates. Atomics.add is one indivisible step."],

/* ---- workers & atomics simulator ---- */
let sim={threads:3,iters:3,atomic:false};
const ITER_SCALE=1_000_000;                 // each "increment" notch = 1,000,000 real ops
// Real SharedArrayBuffer + shared-memory Atomics only exist on a cross-origin-isolated page.
const REAL_RACE=(typeof SharedArrayBuffer!=="undefined") && (self.crossOriginIsolated===true);
const fmt=(n)=>n.toLocaleString("en-US");

// The genuine race: N Worker threads incrementing one shared Int32 over a SharedArrayBuffer.
// Every worker parks on Atomics.wait until the gate opens, so they collide head-on.
function runRealRace({threads,iters,atomic}){
  return new Promise((resolve,reject)=>{
    let view;
    try{
      const sab=new SharedArrayBuffer(8);   // [0] = counter, [1] = start gate
      view=new Int32Array(sab);
      const workers=[]; let ready=0, done=0;
      const cleanup=()=>workers.forEach(w=>w.terminate());
      for(let i=0;i<threads;i++){
        const w=new Worker("worker.js");
        w.onerror=(err)=>{ cleanup(); reject(err.message||"worker failed to load"); };
        w.onmessage=(e)=>{
          if(e.data.ready){
            if(++ready===threads){ Atomics.store(view,1,1); Atomics.notify(view,1); }  // open the gate for all at once
          }else if(e.data.done){
            if(++done===threads){
              cleanup();
              resolve({mem:Atomics.load(view,0),expected:threads*iters,threads,iters,atomic});
            }
          }
        };
        w.postMessage({buffer:sab,iters,atomic});
        workers.push(w);
      }
    }catch(err){ reject(err.message||String(err)); }
  });
}

  const real=REAL_RACE;
  main.appendChild(el(`<div>

    <p class="lead">This is the one place JS has a real data race: multiple worker threads touching the same <b style="color:var(--text)">SharedArrayBuffer</b>. A plain <code style="font-family:var(--mono)">counter++</code> is three steps — read, add, write — and concurrent threads interleave those steps and clobber each other.</p>
    <p class="sub">${real
      ? `This page is <b style="color:var(--ordered)">cross-origin isolated</b>, so the run below spins up <b style="color:var(--text)">real Worker threads</b> over a genuine SharedArrayBuffer. With <b style="color:var(--text)">Atomic</b> off the count comes out wrong — and differently wrong each run. Flip it on and it&rsquo;s exact every time.`
      : `Real SharedArrayBuffer needs cross-origin isolation, which isn&rsquo;t available here, so the run below <b style="color:var(--text)">simulates</b> the interleaving step by step. The lost-update behavior is identical. Flip <b style="color:var(--text)">Atomic</b> off and run it a few times.`}</p>
  </div>`));

  const card=el(`<div class="card"><h2>${real?"Live data race":"Interleaving simulator"}</h2><div class="why">// each thread increments a shared counter</div></div>`);

  // isolation status badge
  const badge=el(`<div class="result ${real?"exact":""}" style="display:flex;align-items:center;gap:8px;margin:0 0 4px">
    ${real
      ? `<b style="color:var(--ordered)">● real threads</b> <span class="sub" style="font-size:12px">crossOriginIsolated = true · SharedArrayBuffer live</span>`
      : `<b style="color:var(--race)">● simulated</b> <span class="sub" style="font-size:12px">crossOriginIsolated = false · stepwise model</span>`}
  </div>`);
  if(!real) badge.style.borderColor="var(--line)";
  card.appendChild(badge);

  const ctrls=el(`<div class="ctrls"></div>`);
  const tEl=el(`<label class="ctrl">threads <input type="range" min="2" max="4" value="${sim.threads}"> <b style="color:var(--text)" data-tv>${sim.threads}</b></label>`);
  const iEl=el(`<label class="ctrl">${real?"×&nbsp;million inc":"×&nbsp;increments"} <input type="range" min="2" max="4" value="${sim.iters}"> <b style="color:var(--text)" data-iv>${sim.iters}</b></label>`);
  const aEl=el(`<div class="toggle ${sim.atomic?"on":""}"><div class="switch"></div> Atomic</div>`);
  tEl.querySelector("input").oninput=e=>{sim.threads=+e.target.value;tEl.querySelector("[data-tv]").textContent=sim.threads;};
  iEl.querySelector("input").oninput=e=>{sim.iters=+e.target.value;iEl.querySelector("[data-iv]").textContent=sim.iters;};
  aEl.onclick=()=>{sim.atomic=!sim.atomic;aEl.classList.toggle("on",sim.atomic);};
  ctrls.append(tEl,iEl,aEl);
  card.appendChild(ctrls);

  const runBtn=el(`<button class="btn go">▶ ${real?"run real threads":"run interleaving"}</button>`);
  const tape=el(`<div class="tape"></div>`);
  const result=el(`<div class="result" style="display:none"></div>`);
  const colors=["var(--accent)","var(--ordered)","var(--race)","#e0c25a"];

  const showResult=(mem,expected,extra)=>{
    result.style.display="block";
    const lost=expected-mem;
    result.className="result "+(lost===0?"exact":"lost");
    const head = lost===0
      ? `counter = ${fmt(mem)}  ·  expected ${fmt(expected)}  ·  exact`
      : `counter = ${fmt(mem)}  ·  expected ${fmt(expected)}  ·  ${fmt(lost)} update${lost>1?"s":""} lost`;
    result.textContent = extra ? head+"  ·  "+extra : head;
  };

  if(real){
    runBtn.onclick=async()=>{
      runBtn.disabled=true; const old=runBtn.textContent; runBtn.textContent="running…";
      tape.innerHTML="";
      const iters=sim.iters*ITER_SCALE;
      try{
        const out=await runRealRace({threads:sim.threads,iters,atomic:sim.atomic});
        showResult(out.mem,out.expected,`${out.threads} workers × ${fmt(iters)} · ${out.atomic?"Atomics.add":"view[0]=view[0]+1"}`);
      }catch(err){
        result.style.display="block"; result.className="result lost";
        result.textContent="worker error: "+err;
      }
      runBtn.disabled=false; runBtn.textContent=old;
    };
  }else{
    runBtn.onclick=()=>{
      const out=simulate(sim);
      tape.innerHTML="";
      out.tape.forEach(s=>{
        const label = s.op==="add" ? `T${s.t} add→${s.mem}`
          : s.op==="read" ? `T${s.t} read ${s.val}` : `T${s.t} write ${s.val}`;
        const chip=el(`<span class="step">${label}</span>`);
        chip.style.borderColor=colors[s.t]; chip.style.color=colors[s.t];
        tape.appendChild(chip);
      });
      showResult(out.mem,out.expected);
    };
  }
  card.appendChild(el(`<div class="row"></div>`)).appendChild(runBtn);
  card.appendChild(tape);
  card.appendChild(result);
  main.appendChild(card);

  main.appendChild(el(`<div class="card">
    <div class="why">// the fix, in real worker code</div>
    <pre class="code"><span class="cm">// racy — read, add, write can interleave</span>
counter[0] = counter[0] + 1;

<span class="cm">// safe — one indivisible operation</span>
<span class="ok">Atomics.add(counter, 0, 1);</span>

<span class="cm">// Atomics.wait / Atomics.notify build a real
// blocking lock across threads — the worker-world mutex.</span></pre>
    <p class="sub" style="margin-bottom:0">${real
      ? `This is exactly what runs above: <code style="font-family:var(--mono)">worker.js</code> increments a shared <code style="font-family:var(--mono)">Int32Array</code>, parked on <code style="font-family:var(--mono)">Atomics.wait</code> until every worker is ready so they collide head-on.`
      : `In the browser, real SharedArrayBuffer needs cross-origin isolation headers (<code style="font-family:var(--mono)">COOP</code> + <code style="font-family:var(--mono)">COEP</code>). On a host that sets them, this exact module runs genuine threads via <code style="font-family:var(--mono)">worker.js</code> instead of simulating.`}</p>
  </div>`));
}

function simulate({threads,iters,atomic}){
  const expected=threads*iters;
  if(atomic){
    const tape=[]; let mem=0;
    const seq=[]; for(let t=0;t<threads;t++) for(let k=0;k<iters;k++) seq.push(t);
    // shuffle
    for(let i=seq.length-1;i>0;i--){const j=rnd(i+1);[seq[i],seq[j]]=[seq[j],seq[i]];}
    seq.forEach(t=>{mem+=1;tape.push({t,op:"add",mem});});
    return {mem,tape,expected};
  }
  // non-atomic: each increment = read then write, with a private register
  let mem=0; const reg=new Array(threads).fill(0);
  const phase=new Array(threads).fill("read"); const remaining=new Array(threads).fill(iters);
  const tape=[]; let steps=threads*iters*2;
  while(steps>0){
    const active=[]; for(let i=0;i<threads;i++) if(remaining[i]>0) active.push(i);
    const t=active[rnd(active.length)];
    if(phase[t]==="read"){ reg[t]=mem; tape.push({t,op:"read",val:mem}); phase[t]="write"; }
    else { mem=reg[t]+1; tape.push({t,op:"write",val:mem}); phase[t]="read"; remaining[t]--; }
    steps--;
  }
  return {mem,tape,expected};
}

  </div>`);
  fc.onclick=()=>{ cardFlipped=!cardFlipped; renderCards(); };
  main.appendChild(fc);
  const row=el(`<div class="row"></div>`);
