<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Concurrency Bootcamp</title>
<meta name="description" content="A mobile-first, offline-capable bootcamp for JavaScript concurrency — lessons, drills, and a scored test.">
<!-- PWA: installable + works offline -->
<meta name="theme-color" content="#14161f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concurrency">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#14161f; --surface:#1b1f2e; --surface2:#232940; --line:#2c3350;
    --text:#e7e9f3; --muted:#9298b0; --faint:#6a7090;
    --ordered:#57e0b0;   /* in-order / correct */
    --race:#ff9a6b;      /* lost / contention */
    --accent:#8e86f0;    /* interactive */
    --ok-bg:rgba(87,224,176,.12); --bad-bg:rgba(255,154,107,.12);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    line-height:1.55; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  /* header */
  header{
    position:sticky;top:0;z-index:20;background:rgba(20,22,31,.86);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:17px;letter-spacing:-.01em}
  .brand .tick{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em}
  .prog{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right}
  .prog .n{color:var(--ordered)}
  .bar{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:10px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--ordered));transition:width .4s ease}

  /* module chips */
  nav{display:flex;gap:8px;overflow-x:auto;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;font-family:var(--mono);font-size:12px;letter-spacing:.02em;
    padding:8px 13px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;
    min-height:38px;
  }
  .chip[aria-selected="true"]{background:var(--accent);border-color:var(--accent);color:#11131c;font-weight:600}

  /* eyebrow + headings */
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:26px 0 6px}
  h1{font-size:26px;line-height:1.15;letter-spacing:-.02em;margin:0 0 8px}
  h2{font-size:19px;letter-spacing:-.01em;margin:0 0 6px}
  p.lead{color:var(--muted);margin:0 0 8px}
  .sub{color:var(--muted);font-size:14px}

  /* card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:14px 0}
  .card h2{margin-bottom:2px}
  .card .why{color:var(--faint);font-size:13px;font-family:var(--mono);margin:0 0 12px}

  /* code */
  pre.code{
    background:#11131c;border:1px solid var(--line);border-radius:10px;
    font-family:var(--mono);font-size:12.5px;line-height:1.7;color:#cdd2e6;
    padding:12px;margin:10px 0;overflow-x:auto;white-space:pre;
  }
  pre.code .cm{color:var(--faint)}
  pre.code .kw{color:var(--accent)}
  pre.code .ok{color:var(--ordered)}

  /* blank chooser */
  .blank{margin:9px 0;border-left:2px solid var(--race);padding-left:10px}
  .blank .q{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--race);text-transform:uppercase;margin-bottom:6px}
  .blank.solved .q{color:var(--ordered)}
  .opt{
    display:block;width:100%;text-align:left;font-family:var(--mono);font-size:12px;line-height:1.55;
    background:#11131c;border:1px solid var(--line);color:#cdd2e6;border-radius:9px;
    padding:10px 11px;margin:7px 0;cursor:pointer;white-space:pre-wrap;
  }
  .opt:active{transform:scale(.995)}
  .opt.correct{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered)}
  .opt.wrong{border-color:var(--race);background:var(--bad-bg);color:var(--race);animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .why-line{font-size:12.5px;color:var(--muted);margin:6px 0 2px;padding-left:10px;border-left:2px solid var(--line)}

  /* buttons */
  .btn{
    font-family:var(--mono);font-size:13px;letter-spacing:.02em;
    padding:11px 15px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);cursor:pointer;min-height:44px;
  }
  .btn.go{background:var(--accent);border-color:var(--accent);color:#11131c;font-weight:600}
  .btn:disabled{opacity:.4;cursor:default}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}

  /* console */
  .console{
    font-family:var(--mono);font-size:12px;line-height:1.65;background:#0d0f17;
    border:1px solid var(--line);border-radius:10px;padding:11px;margin-top:10px;
    white-space:pre-wrap;min-height:20px;color:#aeb4cf;
  }
  .console .pass{color:var(--ordered)}
  .console .fail{color:var(--race)}

  /* done badge */
  .done{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ordered);letter-spacing:.04em}
  .done.hidden{display:none}

  /* quiz / flashcard */
  .qopt{display:block;width:100%;text-align:left;font-size:14px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px;margin:7px 0;cursor:pointer;min-height:44px}
  .qopt.correct{border-color:var(--ordered);background:var(--ok-bg)}
  .qopt.wrong{border-color:var(--race);background:var(--bad-bg)}
  .flash{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;min-height:120px;cursor:pointer;display:flex;flex-direction:column;justify-content:center}
  .flash .face{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .flash .body{font-size:15.5px}
  .flash.back .face{color:var(--ordered)}

  /* simulator */
  .ctrls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:10px 0}
  .ctrl{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .ctrl input[type=range]{vertical-align:middle;width:120px;accent-color:var(--accent)}
  .toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:12px;min-height:38px}
  .switch{width:42px;height:24px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);position:relative;transition:background .2s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
  .toggle.on .switch{background:var(--ordered)}
  .toggle.on .switch::after{transform:translateX(18px);background:#11131c}
  .tape{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0}
  .step{font-family:var(--mono);font-size:10.5px;padding:4px 6px;border-radius:6px;border:1px solid var(--line);background:#11131c}
  .result{font-family:var(--mono);font-size:13px;margin-top:8px;padding:11px;border-radius:10px;border:1px solid var(--line)}
  .result.lost{border-color:var(--race);background:var(--bad-bg);color:var(--race)}
  .result.exact{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered)}

  footer{color:var(--faint);font-size:12px;text-align:center;padding:30px 0 40px;font-family:var(--mono)}
  footer .credit{display:block;margin-bottom:14px}
  .resetbtn{
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint);
    background:transparent;border:1px solid var(--line);border-radius:8px;
    padding:8px 13px;cursor:pointer;min-height:36px;
  }
  .resetbtn:hover,.resetbtn:active{color:var(--race);border-color:var(--race)}
  a{color:var(--accent)}

  /* lessons */
  .lesson p{color:var(--muted);font-size:14.5px;margin:11px 0}
  .lesson p.big{font-size:15.5px;color:var(--text);margin-top:2px}
  .lesson b.hl{color:var(--text)}
  .lesson code{font-family:var(--mono);font-size:12px;background:#11131c;border:1px solid var(--line);border-radius:6px;padding:1px 5px;color:#cdd2e6}
  .diagram{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0}
  .dcols{display:flex;gap:14px;flex-wrap:wrap}
  .dcol{flex:1;min-width:130px}
  .dlabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .dnote{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.65}
  .chip2{display:inline-block;font-family:var(--mono);font-size:11.5px;padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:#11131c;color:#cdd2e6;margin:3px 3px 3px 0}
  .chip2.micro{border-color:var(--ordered);color:var(--ordered)}
  .chip2.macro{border-color:var(--race);color:var(--race)}
  .chip2.sync{border-color:var(--accent);color:var(--accent)}
  .stackcol{display:flex;flex-direction:column-reverse;gap:5px}
  .frame{font-family:var(--mono);font-size:11.5px;background:#11131c;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:6px 9px;color:#cdd2e6}
  .qbox{border:1px dashed var(--line);border-radius:8px;padding:9px;margin-top:8px}
  .qbox.micro{border-color:rgba(87,224,176,.45)}
  .qbox.macro{border-color:rgba(255,154,107,.45)}
  .lanes{display:grid;grid-template-columns:auto 1fr;gap:6px 10px;align-items:center;font-family:var(--mono);font-size:11.5px}
  .lanehead{color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-size:9.5px}
  .lstep{background:#11131c;border:1px solid var(--line);border-radius:6px;padding:6px 9px;color:#cdd2e6}
  .lstep.bad{border-color:var(--race);color:var(--race);background:var(--bad-bg)}
  .lstep.good{border-color:var(--ordered);color:var(--ordered);background:var(--ok-bg)}
  .lstep.wait{color:var(--faint);border-style:dashed}
  .flowarrow{text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px;margin:8px 0}
  .memcell{display:inline-flex;align-items:center;justify-content:center;min-width:50px;height:42px;padding:0 8px;border:1px solid var(--accent);border-radius:8px;font-family:var(--mono);font-size:16px;color:var(--text);background:#11131c}
  .threadbox{flex:1;min-width:96px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.5}
  .permits{display:flex;gap:6px}
  .permit{width:22px;height:22px;border-radius:6px;border:1px solid var(--ordered);background:var(--ok-bg)}
  .permit.used{border-color:var(--line);background:#11131c}
  .histtape{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* lesson animations: .seq items reveal in --i order once .anim gets .playing */
  .anim.playing .seq{animation:seqin .5s ease both;animation-delay:calc(var(--i,0) * var(--step,.6s))}
  .anim.playing .seq.pop{animation:seqpop .52s ease both;animation-delay:calc(var(--i,0) * var(--step,.6s))}
  @keyframes seqin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:none}}
  @keyframes seqpop{0%{opacity:0;transform:scale(.9)}60%{transform:scale(1.06)}100%{opacity:1;transform:none}}
  .spin{display:inline-block;animation:spin 3.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .playbtn{font-family:var(--mono);font-size:12px;letter-spacing:.02em;padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);color:var(--text);cursor:pointer;min-height:36px;margin-top:2px}
  .playbtn:active{transform:scale(.97)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>

<header>
  <div class="wrap">
    <div class="hbar">
      <div class="brand"><b>Concurrency Bootcamp</b><span class="tick">// single thread, many turns</span></div>
      <div class="prog">drills&nbsp;<span class="n" id="pn">0</span>/<span id="pt">8</span></div>
    </div>
    <div class="bar"><i id="progbar"></i></div>
    <nav id="nav"></nav>
  </div>
</header>

<main class="wrap" id="main"></main>
<footer>
  <span class="credit">built for thumb-driving on a phone · every drill runs real JS in your browser</span>
  <button class="resetbtn" id="resetbtn" type="button">reset progress</button>
</footer>

<script>
"use strict";

/* ---------- tiny helpers available to demos ---------- */
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
function deferred(){ let resolve,reject; const promise=new Promise((res,rej)=>{resolve=res;reject=rej;}); return {promise,resolve,reject}; }
const rnd = (n) => Math.floor(Math.random()*n);

/* ===========================================================
   REFERENCE IMPLEMENTATIONS  (these power the Run buttons)
   =========================================================== */
class Mutex{
  #locked=false; #queue=[];
  async acquire(){ if(!this.#locked){this.#locked=true;return;} const d=deferred(); this.#queue.push(d); await d.promise; }
  release(){ const n=this.#queue.shift(); if(n) n.resolve(); else this.#locked=false; }
  async runExclusive(fn){ await this.acquire(); try{ return await fn(); } finally{ this.release(); } }
}
class Semaphore{
  #permits; #queue=[];
  constructor(p){ this.#permits=p; }
  async acquire(){ if(this.#permits>0){this.#permits--;return;} const d=deferred(); this.#queue.push(d); await d.promise; }
  release(){ const n=this.#queue.shift(); if(n) n.resolve(); else this.#permits++; }
}
class Latch{ #d=deferred(); wait(){return this.#d.promise;} open(){this.#d.resolve();} }
class Barrier{
  #parties; #count=0; #d=deferred();
  constructor(p){ this.#parties=p; }
  async arrive(label){ if(++this.#count===this.#parties) this.#d.resolve(); await this.#d.promise; return label; }
}
class AsyncQueue{
  #values=[]; #waiters=[];
  push(v){ const w=this.#waiters.shift(); if(w) w.resolve(v); else this.#values.push(v); }
  async pull(){ if(this.#values.length) return this.#values.shift(); const d=deferred(); this.#waiters.push(d); return d.promise; }
}
class Sequencer{
  #next=0; #gates=new Map();
  acquire(seq){ if(seq<=this.#next) return Promise.resolve(); return new Promise(res=>this.#gates.set(seq,res)); }
  release(seq){ this.#next=seq+1; const n=this.#gates.get(this.#next); if(n){ this.#gates.delete(this.#next); n(); } }
}
async function pool(items,limit,worker){
  const results=[]; const executing=new Set();
  for(const [i,item] of items.entries()){
    const p=Promise.resolve().then(()=>worker(item,i));
    results.push(p); executing.add(p); p.finally(()=>executing.delete(p));
    if(executing.size>=limit) await Promise.race(executing);
  }
  return Promise.all(results);
}
class TokenBucket{
  #capacity; #tokens; #ratePerMs; #last=Date.now();
  constructor(capacity,ratePerSec){ this.#capacity=capacity; this.#tokens=capacity; this.#ratePerMs=ratePerSec/1000; }
  #refill(){ const now=Date.now(); const gained=(now-this.#last)*this.#ratePerMs; this.#last=now; this.#tokens=Math.min(this.#capacity,this.#tokens+gained); }
  async take(){ this.#refill(); while(this.#tokens<1){ await sleep((1-this.#tokens)/this.#ratePerMs); this.#refill(); } this.#tokens-=1; }
}
function debounce(fn,wait){
  let t;                                  // the pending timer
  return function(...args){
    clearTimeout(t);                      // cancel the prior pending call
    t=setTimeout(()=>fn.apply(this,args),wait);
  };
}
function throttle(fn,interval){
  let last=0;
  return function(...args){
    const now=Date.now();
    if(now-last>=interval){ last=now; fn.apply(this,args); }
  };
}
function promiseAll(promises){
  return new Promise((resolve,reject)=>{
    const results=[]; let done=0;
    if(promises.length===0) resolve(results);
    promises.forEach((p,i)=>{
      Promise.resolve(p).then(v=>{ results[i]=v; if(++done===promises.length) resolve(results); }, reject);
    });
  });
}
async function retry(fn,{tries=3,base=10}={}){
  let attempt=0;
  for(;;){
    try{ return await fn(); }
    catch(err){
      if(++attempt>=tries) throw err;
      await sleep(base*2**(attempt-1));   // exponential backoff
    }
  }
}
/* ---- durable-execution helpers (replay determinism, durable timeout, condition) ---- */
function makeRuntime(history){
  let cursor=0;
  return {
    // first run: execute fn and record it. replay: return the recorded value verbatim.
    sideEffect(fn){
      if(cursor<history.length) return history[cursor++];
      const v=fn(); history.push(v); cursor++; return v;
    }
  };
}
function withTimeout(work,ms){
  return Promise.race([                          // first to settle wins
    work,
    sleep(ms).then(()=>({timedOut:true})),
  ]);
}
function makeCondition(){
  let waiters=[];
  return {
    notify(){ const w=waiters; waiters=[]; w.forEach(r=>r()); },
    async wait(pred){ while(!pred()){ const d=deferred(); waiters.push(d.resolve); await d.promise; } }
  };
}
function select(sources){
  // race tagged sources; resolve with {label,value} of whichever settles first
  return Promise.race(sources.map(s=>s.promise.then(v=>({label:s.label,value:v}))));
}
function memoizeAsync(fn){
  const cache=new Map();   // key -> in-flight or settled promise
  return (key)=>{
    if(cache.has(key)) return cache.get(key);                 // share the existing computation
    const p=fn(key).catch(e=>{ cache.delete(key); throw e; }); // evict on failure
    cache.set(key,p);
    return p;
  };
}
class BoundedQueue{
  #cap; #buf=[]; #pushW=[]; #pullW=[];
  constructor(cap){ this.#cap=cap; }
  async push(v){
    while(this.#buf.length>=this.#cap){ const d=deferred(); this.#pushW.push(d); await d.promise; }   // block while full
    this.#buf.push(v);
    const w=this.#pullW.shift(); if(w) w.resolve();      // wake a waiting consumer
  }
  async pull(){
    while(this.#buf.length===0){ const d=deferred(); this.#pullW.push(d); await d.promise; }           // block while empty
    const v=this.#buf.shift();
    const w=this.#pushW.shift(); if(w) w.resolve();      // wake a blocked producer
    return v;
  }
  size(){ return this.#buf.length; }
}
function atomicTryAcquire(cell){ return Atomics.compareExchange(cell,0,0,1)===0; }  // 0->1 iff free
function atomicRelease(cell){ Atomics.store(cell,0,0); }
class RWLock{
  #readers=0; #writing=false; #rq=[]; #wq=[];
  async acquireRead(){ if(this.#writing||this.#wq.length){ const d=deferred(); this.#rq.push(d); await d.promise; } else this.#readers++; }
  releaseRead(){ this.#readers--; this.#dispatch(); }
  async acquireWrite(){ if(this.#writing||this.#readers>0||this.#wq.length){ const d=deferred(); this.#wq.push(d); await d.promise; } else this.#writing=true; }
  releaseWrite(){ this.#writing=false; this.#dispatch(); }
  #dispatch(){
    if(this.#writing) return;
    if(this.#readers===0 && this.#wq.length){ this.#writing=true; this.#wq.shift().resolve(); }
    else if(!this.#wq.length){ while(this.#rq.length){ this.#readers++; this.#rq.shift().resolve(); } }
  }
}
function once(fn){ let p; return ()=> (p ??= fn()); }
function withTimeoutCancel(workFn,ms){
  const ctrl=new AbortController();
  const work=workFn(ctrl.signal).then(v=>({ok:v}),()=>({aborted:true}));
  const timer=sleep(ms).then(()=>{ ctrl.abort(); return {timedOut:true}; });   // cancel the loser
  return Promise.race([work,timer]);
}
async function errgroup(taskFns){
  const ctrl=new AbortController();
  const tasks=taskFns.map(fn=>fn(ctrl.signal).catch(err=>{ ctrl.abort(); throw err; }));  // first failure cancels the rest
  return Promise.all(tasks);
}

/* ===========================================================
   DEMOS  -> return {lines:[{t,cls}], pass:boolean}
   =========================================================== */
async function demoMutex(){
  const m=new Mutex(); let inside=0,max=0;
  await Promise.all([1,2,3,4,5].map(()=>m.runExclusive(async()=>{inside++;max=Math.max(max,inside);await sleep(rnd(18));inside--;})));
  return {lines:[{t:`5 tasks ran through one lock`},{t:`max concurrent holders = ${max}`}], pass:max===1, verdict:`max holders ${max} (want 1)`};
}
async function demoSemaphore(){
  const s=new Semaphore(2); let inside=0,max=0;

  history.push(v); cursor++;       // ...and record it for future replays
  return v;
}` },

    { id:"durabletimeout", title:"Durable timeout", why:"race the activity against a durable timer; first to settle wins", demo:demoDurableTimeout,
      pre:`// Give an activity a deadline: run it and a durable timer concurrently
// and take whichever finishes first. (In Temporal both survive a worker
// crash; here we model the race itself.)
function withTimeout(work, ms) {`,
      blank:{ q:"race the work against a timer so a hung activity can't block forever:",
        options:[
`  return Promise.race([
    work,
    sleep(ms).then(() => ({ timedOut: true })),
  ]);`,
`  return Promise.all([
    work,
    sleep(ms).then(() => ({ timedOut: true })),
  ]).then(([w]) => w);`,
`  const w = await work;           // wait for the activity first
  await sleep(ms);                // then start the timer
  return w;`],
        answer:0,
        whys:["Right. race settles the moment either the activity finishes or the timer fires — the durable timeout. The loser keeps running unless you cancel it (Temporal uses a CancellationScope).",
              "Promise.all waits for BOTH to settle, so a hung activity is never cut off — there is no timeout at all.",
              "Awaiting the work before the timer makes them sequential: a hung activity blocks forever and the timer never gets to fire."] },
      post:`}` },

    { id:"signalmutex", title:"Serialize concurrent signals", why:"signal handlers interleave at awaits — a critical section needs a lock", demo:demoSignalMutex,
      pre:`// A running workflow receives signals concurrently. Handlers are
// coroutines on one thread — no mid-statement preemption, but they DO
// interleave at every await. A read-modify-write that spans an await
// loses updates without a lock.
const mutex = new Mutex();
async function onWithdraw(amount) {`,
      blank:{ q:"keep two concurrent withdraw signals from losing updates:",
        options:[
`  await mutex.runExclusive(async () => {
    const bal = balance;          // read
    await checkLimits(amount);    // await — others would interleave here
    balance = bal - amount;       // write
  });`,
`  const bal = balance;            // read
  await checkLimits(amount);      // await
  balance = bal - amount;         // write`,
`  const bal = balance;
  balance = bal - amount;         // write before awaiting
  await checkLimits(amount);`],
        answer:0,
        whys:["Right. The mutex serializes the whole read-await-write, so a second signal can't read `balance` until the first has written it back — no lost updates.",
              "With no lock, a second signal reads `balance` during the first one's await; both write back stale values — a lost update across the await.",
              "Writing before the await dodges this one case, but it commits the change before checkLimits can reject it, and any handler that must await between read and write is still unsafe."] },
      post:`}` },

    { id:"condition", title:"Wait for a signal", why:"block the workflow until a signal flips state true — Temporal's condition()", demo:demoCondition,
      pre:`// condition(): suspend the workflow until a signal makes the predicate
// true. Re-check on every wake — a still-false predicate (another
// signal, a spurious wake) has to keep waiting.
async function wait(pred) {`,
      blank:{ q:"block until pred() holds, re-checking on each notify:",
        options:[
`  while (!pred()) {                // re-check after every wake
    const d = deferred();
    waiters.push(d.resolve);
    await d.promise;
  }`,
`  if (!pred()) {                   // check once
    const d = deferred();
    waiters.push(d.resolve);
    await d.promise;
  }`,
`  while (!pred()) {
    await sleep(0);                // poll the predicate
  }`],
        answer:0,
        whys:["Right. Park on a deferred, and on every notify re-check the predicate in a loop — you only proceed once it's genuinely true.",
              "An `if` proceeds on the first notify even if the predicate is still false (a different signal, a spurious wake). Re-check in a loop, not once.",
              "Polling with sleep(0) busy-waits the event loop instead of parking until a signal arrives — wasteful, and in a deterministic workflow, nondeterministic."] },
      post:`}` },
  ],
};

/* ---- flashcards ---- */
const CARDS = [
  ["When is spinning a thread the wrong call?","Per-unit work is tiny (~1ms). Spawn + message-passing + serialization cost dwarfs the work. Threads pay off only for CPU-bound work big enough to amortize them."],
  ["I/O-bound vs CPU-bound — which wants workers?","CPU-bound wants workers (genuine parallel compute). I/O-bound is better single-threaded async: you're waiting, not computing, so a thread just sits idle."],
  ["Where do data races actually exist in JS?","Only across worker_threads / Web Workers sharing a SharedArrayBuffer. Single-threaded run-to-completion rules them out everywhere else."],
  ["What does strict ordering cost you?","Availability. A stalled producer blocks everyone behind it. Ordering trades availability for consistency — recognize the trade before it bites you."],
  ["Unbounded retry against a dead dependency?","An unbounded backlog. Robustness isn't free: cap retries, add a circuit breaker or dead-letter path, and bound the queue."],
  ["Why Atomics.add over view[0]++ across threads?","view[0]++ is read-modify-write — three steps that interleave and lose updates. Atomics.add is one indivisible step."],
  ["Why can't a durable workflow call Date.now() or Math.random() directly?","Workflow code is re-executed from history on replay to rebuild state. Wall-clock and randomness differ each run, so replay would diverge from history. Route them through the runtime (workflow time, sideEffect) so the recorded value replays exactly."],
  ["A long-running workflow's event history keeps growing — then what?","History is replayed on every wake, so unbounded history means unbounded replay cost and a hard size cap. continue-as-new starts a fresh execution, carrying state forward with an empty history — the same instinct as capping a queue."],
  ["An activity ran, then the worker died before its result was recorded. Does it run again?","Yes — execution is at-least-once, so an activity can run more than once. Make activities idempotent (dedupe by a stable key) so a retry doesn't double-charge."],
  ["Two signals hit a running workflow at once — is its state safe?","Handlers are coroutines on one thread: no mid-statement preemption, but they interleave at every await. A read-modify-write spanning an await needs a mutex — the same hazard as any async critical section."],
  ["Condition variable: why `while (!ready) wait()` and never `if`?","Spurious wakeups and multiple waiters. A waiter can wake while the predicate is still false (another waiter consumed the change, or a bare wake). Re-check the predicate in a loop, not with a one-time `if`."],
  ["How do atomics implement a lock?","A lock sits on an atomic compare-and-swap: in one indivisible step, test 'is it 0?' and set it to 1. Win the CAS and you hold the lock; lose and you wait/retry. Atomics are the primitive beneath mutexes and semaphores."],
  ["Bounded vs unbounded queue?","Unbounded hides backpressure: a fast producer grows the backlog until memory dies. A bounded queue blocks the producer when full, pushing the slowdown back to the source — capacity IS the flow control."],
  ["Wait for N concurrent tasks to finish — how?","`await Promise.all([...])` resolves once every task settles (use `Promise.allSettled` to get results even when some reject). This barrier is 'all done' — distinct from a rendezvous barrier, which is 'all start together'."],
  ["Blocking vs non-blocking vs async, one line each?","Blocking: stop the thread until ready. Non-blocking: return now with success-or-not, caller retries. Async: hand off, keep going, get a callback later. You're trading thread-cost ↔ control ↔ throughput."],
  ["Thread pool / executor — the JS equivalent?","Bound parallelism with a concurrency pool: launch tasks up to a limit, then `await Promise.race(inFlight)` to free a slot before starting the next. Each task is just a promise you await — promises are JS's futures."],
  ["Wait on whichever of several async sources is ready first?","Tag each source, then `Promise.race` them — the first to settle wins and you know which. (A true channel-select also avoids consuming the losers; race alone doesn't.)"],
];

/* ===========================================================
   STATE + PERSISTENCE
   =========================================================== */
const TOTAL = DRILLS.primitives.length + DRILLS.bank.length + DRILLS.toolkit.length + DRILLS.durable.length;
let state = { module:"learn", solved:{} };

/* one-at-a-time stepping: where we are inside each stepped module */
let learnIdx = 0;                                          // current lesson chapter
let modelIdx = 0;                                          // current quiz question
let test = { on:false, qs:[], idx:0, score:0, answered:false };  // scored test mode
let drillIdx = { primitives:0, bank:0, toolkit:0, durable:0 };  // current drill per module
let quizDone = {};                                         // qi -> answered correctly (in-memory)

const STORAGE_KEY="cbootcamp:solved";
const POSITION_KEY="cbootcamp:position";   // where the user left off (lessons + skills)
function loadProgress(){
  // skills pieces: which drills are solved
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) state.solved=JSON.parse(raw); }
  catch(e){ /* private mode / blocked storage -> stay in-memory */ }
  // lessons + skills progress: resume where the user left off
  try{
    const raw=localStorage.getItem(POSITION_KEY);
    if(raw){
      const p=JSON.parse(raw);
      if(typeof p.module==="string" && MODULES.some(m=>m.id===p.module)) state.module=p.module;
      if(Number.isInteger(p.learnIdx)) learnIdx=p.learnIdx;
      if(Number.isInteger(p.modelIdx)) modelIdx=p.modelIdx;
      if(p.drillIdx && typeof p.drillIdx==="object") Object.assign(drillIdx, p.drillIdx);
      if(p.quizDone && typeof p.quizDone==="object") quizDone=p.quizDone;
    }
  }catch(e){ /* blocked storage -> stay in-memory */ }
  renderProgress();
}
function saveProgress(){
  renderProgress();
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state.solved)); }catch(e){}
}
// persist the user's place across lessons + skills so they resume on return
function savePosition(){
  try{ localStorage.setItem(POSITION_KEY,JSON.stringify({
    module: state.module, learnIdx, modelIdx, drillIdx, quizDone
  })); }catch(e){}
}
// wipe everything: solved drills, quiz answers, and where the user left off
function resetProgress(){
  if(!confirm("Reset all progress? This clears solved drills, quiz answers, and your place in every module.")) return;
  try{ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(POSITION_KEY); }catch(e){}
  state.solved={}; quizDone={};
  learnIdx=0; modelIdx=0;
  drillIdx={ primitives:0, bank:0, toolkit:0, durable:0 };
  test={ on:false, qs:[], idx:0, score:0, answered:false };
  state.module="learn";
  renderProgress(); render(); window.scrollTo({top:0});
}
function renderProgress(){
  const n=Object.keys(state.solved).length;
  document.getElementById("pn").textContent=n;
  document.getElementById("pt").textContent=TOTAL;
  document.getElementById("progbar").style.width=(100*n/TOTAL)+"%";
}

/* ===========================================================
   RENDER
   =========================================================== */
const main=document.getElementById("main");
const nav=document.getElementById("nav");

function renderNav(){
  nav.innerHTML="";
  MODULES.forEach(m=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=m.label; b.setAttribute("role","tab");
    b.setAttribute("aria-selected", state.module===m.id ? "true":"false");
    b.onclick=()=>{ state.module=m.id; render(); window.scrollTo({top:0}); };
    nav.appendChild(b);
  });
}

function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstElementChild; }

function render(){
  savePosition();
  renderNav();
  main.innerHTML="";
  const m=MODULES.find(x=>x.id===state.module);
  if(m.type==="learn") renderLearn();
  else if(m.type==="lesson") renderModel();
  else if(m.type==="drills") renderDrills(state.module);
  else if(m.type==="sim") renderSim();
  else if(m.type==="cards") renderCards();
  else if(m.type==="test") renderTest();
}

/* ---- one-at-a-time stepper control (prev · n/total · next) ---- */
function stepperRow(idx, total, go){
  const row=el(`<div class="row" style="justify-content:space-between;align-items:center;margin-top:14px"></div>`);
  const prev=el(`<button class="btn">‹ prev</button>`);
  const pos=el(`<span class="ctrl">${idx+1} / ${total}</span>`);
  const next=el(`<button class="btn go">next ›</button>`);
  if(idx===0) prev.disabled=true;
  if(idx===total-1) next.disabled=true;
  prev.onclick=()=>go(idx-1);
  next.onclick=()=>go(idx+1);
  row.append(prev,pos,next);
  return row;
}

  { eb:"lesson 01 · the model", title:"One thread, many turns", html:`

  { eb:"lesson 05 · primitives", title:"Latch & barrier", html:`
    <p class="big">Two coordination gates. A <b class="hl">latch</b> opens once and lets everyone through (a start signal). A <b class="hl">barrier</b> holds N parties until the last one arrives, then releases them together (a rendezvous).</p>

      <div class="lanes">
        <div class="lanehead seq" style="--i:0">Thread 1</div><div class="lstep good seq" style="--i:0">CAS 0&rarr;1 &nbsp;&#10003; won &mdash; holds the lock</div>
        <div class="lanehead seq" style="--i:1">Thread 2</div><div class="lstep bad seq" style="--i:1">CAS 0&rarr;1 &nbsp;&#10007; cell was 1 &mdash; must wait</div>
      </div>
      <div class="dnote seq" style="--i:3">Both ran CAS at once; only one could flip 0&rarr;1. A plain <code>if (cell == 0) cell = 1</code> would let both in — two steps interleave.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> every mutex and semaphore sits on a CAS like this; <code>Atomics.wait</code>/<code>notify</code> add the "park until free" part. A classic interview probe.</p>` },

  { eb:"lesson 08 · primitives", title:"Read / write lock", html:`
    <p class="big">When reads vastly outnumber writes, a plain mutex is wasteful — readers don't conflict with each other. A <b class="hl">read/write lock</b> lets <b class="hl">many readers</b> in at once, but a <b class="hl">writer</b> gets it alone.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">many readers OR one exclusive writer</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">readers</div><div class="lstep good seq pop" style="--i:0">R1 R2 R3 &mdash; all reading together</div>
        <div class="lanehead seq" style="--i:1">writer</div><div class="lstep wait seq" style="--i:1">waits for readers to drain</div>
        <div class="lanehead seq" style="--i:2">writer</div><div class="lstep seq pop" style="--i:2">readers = 0 &rarr; writes alone</div>
        <div class="lanehead seq" style="--i:3">readers</div><div class="lstep wait seq" style="--i:3">new readers wait while writing</div>
      </div>
      <div class="dnote seq" style="--i:4">Grant a writer only when no readers hold it; don't let a steady stream of readers starve a waiting writer.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> read-heavy caches and config stores get big throughput wins from shared reads — as long as writers still get exclusive access.</p>` },

  { eb:"lesson 09 · primitives", title:"Run once (lazy init)", html:`
    <p class="big">Initialize something <b class="hl">exactly once</b>, even when many callers ask for it at the same time — a lazy singleton (open the DB pool, load config). The trick: cache the in-flight <b class="hl">promise</b>, not the value.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">4 concurrent callers, one initializer</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">c1</div><div class="lstep good seq" style="--i:0">no promise yet &rarr; start init() &middot; store it</div>
        <div class="lanehead seq" style="--i:1">c2</div><div class="lstep seq" style="--i:1">promise exists &rarr; await it</div>
        <div class="lanehead seq" style="--i:2">c3, c4</div><div class="lstep seq" style="--i:2">promise exists &rarr; await it</div>
        <div class="lanehead seq" style="--i:3">all</div><div class="lstep good seq pop" style="--i:3">init resolves once &rarr; same result to everyone</div>
      </div>
      <div class="dnote seq" style="--i:4">Caching the value instead of the promise loses the race: callers that arrive mid-init each start their own.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> the difference between one DB connection and a thundering herd of them is exactly "cache the promise, not the value."</p>` },

  { eb:"lesson 10 · workers & atomics", title:"Real threads, real races", html:`
    <p class="big">For genuine parallelism — CPU-bound work — JS uses <b class="hl">Workers</b>, separate OS threads. They don't share variables; they message-pass. The one exception is a <code>SharedArrayBuffer</code>, where threads touch the <b class="hl">same memory</b> — and that's where true data races appear.</p>
    <div class="diagram anim" style="--step:.85s">
      <div class="dlabel">two threads, one shared counter (starts at 5), each does counter++</div>
      <div style="text-align:center;margin:4px 0 10px">shared cell &nbsp;<span class="memcell seq pop" style="--i:5">6</span></div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">Thread 1</div><div class="lstep seq" style="--i:0">read counter &rarr; 5</div>
        <div class="lanehead seq" style="--i:1">Thread 2</div><div class="lstep seq" style="--i:1">read counter &rarr; 5</div>
        <div class="lanehead seq" style="--i:2">Thread 1</div><div class="lstep seq" style="--i:2">write 5 + 1 = 6</div>
        <div class="lanehead seq" style="--i:3">Thread 2</div><div class="lstep bad seq pop" style="--i:3">write 5 + 1 = 6 &nbsp;&#10007; should be 7</div>
      </div>
      <div class="dnote seq" style="--i:4"><code>counter++</code> is three steps — read, add, write. Both read <b>5</b>, both write <b>6</b>: two increments, the count rose by one. <b style="color:var(--race)">Lost update.</b></div>
      <div class="flowarrow seq" style="--i:6">&darr; the fix</div>
      <div class="dnote seq" style="--i:7"><code style="color:var(--ordered)">Atomics.add(counter, 0, 1)</code> is one <b class="hl">indivisible</b> step — no thread can slip between read and write. <code>Atomics.wait</code> / <code>notify</code> build real cross-thread locks.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> threads pay off only for compute big enough to amortize their cost — and the moment you share memory, you need atomics or a lock, exactly like any other language.</p>` },

  { eb:"lesson 11 · problem patterns", title:"Producer / consumer & backpressure", html:`
    <p class="big">A queue decouples producers from consumers. But an <b class="hl">unbounded</b> queue hides a danger: a fast producer piles work up faster than the consumer drains it, until memory dies. A <b class="hl">bounded</b> queue blocks the producer when full — that's <b class="hl">backpressure</b>.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">capacity 2 &middot; fast producer, slow consumer</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">producer</div><div class="lstep seq" style="--i:0">push 1 &middot; push 2 &mdash; buffer [1, 2]</div>
        <div class="lanehead seq" style="--i:1">producer</div><div class="lstep wait seq pop" style="--i:1">push 3 &rarr; full &rarr; <b>blocks</b></div>
        <div class="lanehead seq" style="--i:2">consumer</div><div class="lstep good seq" style="--i:2">pull 1 &mdash; a slot frees</div>
        <div class="lanehead seq" style="--i:3">producer</div><div class="lstep good seq pop" style="--i:3">unblocks &rarr; push 3 lands</div>
      </div>
      <div class="dnote seq" style="--i:4">Capacity is flow control: the producer's speed is now bounded by the consumer's.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> "what if the producer outpaces the consumer?" is a standard follow-up. The answer is a bounded queue (or drop/sample) — never an unbounded backlog.</p>` },

  { eb:"lesson 12 · problem patterns", title:"Process in order (A &rarr; B &rarr; C)", html:`
    <p class="big">Three subsystems log <b class="hl">concurrently</b>, but must be <b class="hl">processed</b> in a fixed order each cycle. A <b class="hl">sequencer</b> hands out turns: each slot waits for its number, runs, then releases the next.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">turns passed in order, even when B fails first</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">A</div><div class="lstep good seq" style="--i:0">turn 0 &rarr; log A &rarr; release</div>
        <div class="lanehead seq" style="--i:1">B</div><div class="lstep bad seq" style="--i:1">turn 1 &rarr; fails &mdash; do NOT release</div>
        <div class="lanehead seq" style="--i:2">C</div><div class="lstep wait seq" style="--i:2">waits for turn 2 (B holds it)</div>
        <div class="lanehead seq" style="--i:3">B</div><div class="lstep good seq pop" style="--i:3">retry succeeds &rarr; release</div>
        <div class="lanehead seq" style="--i:4">C</div><div class="lstep good seq pop" style="--i:4">turn 2 &rarr; log C</div>
      </div>
      <div class="dnote seq" style="--i:5">Releasing the turn only <b>after</b> success is what makes the order survive a transient failure.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> this is the "Concurrent Log Processor" interview question — ordering plus the fault-tolerance bonus, in one pattern.</p>` },

  { eb:"lesson 13 · problem patterns", title:"Bounded concurrency (the pool)", html:`
    <p class="big">You have 100 jobs but mustn't run them all at once (rate limits, memory, sockets). A <b class="hl">concurrency pool</b> runs at most N at a time: start jobs up to the limit, and each time one finishes, start the next.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">6 jobs, limit 2</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">slots</div><div class="lstep good seq pop" style="--i:0">[ job1 ] [ job2 ] running &middot; 3-6 queued</div>
        <div class="lanehead seq" style="--i:1">job1 done</div><div class="lstep seq" style="--i:1">slot frees &rarr; start job3</div>
        <div class="lanehead seq" style="--i:2">job2 done</div><div class="lstep seq" style="--i:2">slot frees &rarr; start job4</div>
        <div class="lanehead seq" style="--i:3">&hellip;</div><div class="lstep good seq pop" style="--i:3">always &le; 2 in flight until all done</div>
      </div>
      <div class="dnote seq" style="--i:4"><code>await Promise.race(inFlight)</code> waits for the FIRST job to finish, freeing exactly one slot — not <code>Promise.all</code>, which would batch.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> this is the JS thread-pool/executor — the standard answer to "process this list without overwhelming the dependency."</p>` },

  { eb:"lesson 14 · problem patterns", title:"Deadlock & lock ordering", html:`
    <p class="big">Five philosophers, five forks; each needs both neighbours' forks to eat. If everyone grabs their <b class="hl">left</b> fork at once, all five then wait forever on a right fork their neighbour holds — a <b class="hl">circular wait</b>. That's deadlock.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">the circular wait (deadlock)</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">P0</div><div class="lstep bad seq" style="--i:0">holds fork0 &middot; waits fork1</div>
        <div class="lanehead seq" style="--i:1">P1</div><div class="lstep bad seq" style="--i:1">holds fork1 &middot; waits fork2</div>
        <div class="lanehead seq" style="--i:2">&hellip; P4</div><div class="lstep bad seq" style="--i:2">holds fork4 &middot; waits fork0 &mdash; cycle closes</div>
      </div>
      <div class="flowarrow seq" style="--i:3">&darr; the fix: one global lock order</div>
      <div class="dnote seq pop" style="--i:4">Always take the <b style="color:var(--ordered)">lower-numbered</b> fork first. The wrap-around philosopher now reaches for fork0 first too, so the cycle can't form.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> deadlock needs four conditions at once; breaking any one prevents it. A consistent <b class="hl">global lock order</b> is the most practical — it kills the circular wait.</p>` },

  { eb:"lesson 15 · problem patterns", title:"Rate limiting (token bucket)", html:`
    <p class="big">A <b class="hl">token bucket</b> allows a <b class="hl">burst</b> up to its capacity, then settles to a steady rate. Each call spends a token; tokens refill at a fixed rate, capped at capacity.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">capacity 3, refill ~1 / 10ms</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">start</div><div class="lstep good seq pop" style="--i:0">bucket full: &#9679;&#9679;&#9679;</div>
        <div class="lanehead seq" style="--i:1">burst</div><div class="lstep seq" style="--i:1">3 calls fire instantly &mdash; spend all 3</div>
        <div class="lanehead seq" style="--i:2">empty</div><div class="lstep wait seq" style="--i:2">4th call waits for a drip</div>
        <div class="lanehead seq" style="--i:3">refill</div><div class="lstep good seq pop" style="--i:3">+1 token / 10ms &rarr; steady rate</div>
      </div>
      <div class="dnote seq" style="--i:4">The cap bounds the burst; <code>Math.min(cap, tokens + refilled)</code> stops idle time from banking infinite tokens.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> it's the rate limiter that <i>allows</i> bursts (unlike a fixed window) — the usual answer for client throttling and API quotas.</p>` },

  { eb:"lesson 16 · problem patterns", title:"Select — first ready wins", html:`
    <p class="big">Sometimes you want whichever of several async sources is ready <b class="hl">first</b> — fastest replica, first response, value-or-timeout. Tag each source and race them.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">race three sources, take the winner</div>
      <div class="histtape">
        <span class="chip2 seq pop" style="--i:0">A @ 30ms</span>
        <span class="chip2 seq pop" style="--i:1">B @ 6ms</span>
        <span class="chip2 seq pop" style="--i:2">C @ 18ms</span>
      </div>
      <div class="flowarrow seq" style="--i:3">&darr; Promise.race</div>
      <div class="dnote seq pop" style="--i:4"><b style="color:var(--ordered)">B wins</b> (6ms) &mdash; and you learn <i>which</i> source it was via its label.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> it's JS's take on Go's <code>select</code>. (A faithful channel-select also cancels the losers — race alone leaves them running.)</p>` },

  { eb:"lesson 17 · async toolkit", title:"Debounce & throttle", html:`
    <p class="big">Two ways to tame a flood of events. <b class="hl">Debounce</b> waits for quiet: it fires once, after the calls stop (search-as-you-type). <b class="hl">Throttle</b> fires at most once per interval, however fast the calls come (scroll handlers).</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">calls: | | | | | | &nbsp; (a rapid burst)</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">debounce</div><div class="lstep good seq pop" style="--i:0">&hellip; wait for quiet &hellip; &rarr; ONE call</div>
        <div class="lanehead seq" style="--i:1">throttle</div><div class="lstep good seq pop" style="--i:1">fire &middot; (skip) &middot; fire &middot; (skip) &middot; fire</div>
      </div>
      <div class="dnote seq" style="--i:2">Debounce = collapse a burst to its trailing edge. Throttle = a steady rate cap.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> the most common front-end async question — and people constantly mix the two up. Know which one collapses and which rate-caps.</p>` },

  { eb:"lesson 18 · async toolkit", title:"Promise.all, from scratch", html:`
    <p class="big">Run promises concurrently and collect their results <b class="hl">in input order</b>, resolving only when the last one settles (and rejecting on the first failure). The key move: write each result into its own <b class="hl">index</b>, not push.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">[a@18ms, b@2ms, c@10ms] &rarr; results by index</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">b done</div><div class="lstep seq" style="--i:0">results[1] = b &middot; done 1/3</div>
        <div class="lanehead seq" style="--i:1">c done</div><div class="lstep seq" style="--i:1">results[2] = c &middot; done 2/3</div>
        <div class="lanehead seq" style="--i:2">a done</div><div class="lstep good seq pop" style="--i:2">results[0] = a &middot; done 3/3 &rarr; resolve</div>
      </div>
      <div class="dnote seq" style="--i:3">Output is <b style="color:var(--ordered)">[a, b, c]</b> — input order — even though b finished first. <code>push</code> would scramble it.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> a favourite "implement it yourself" question; the index-vs-push detail is exactly what they're checking.</p>` },

  { eb:"lesson 19 · async toolkit", title:"Retry with backoff", html:`
    <p class="big">Transient failures (a flaky network, a busy service) deserve a retry — but a <b class="hl">bounded</b> one, with <b class="hl">exponential backoff</b> so you don't hammer a struggling dependency.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">retry until success, growing the delay</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">try 1</div><div class="lstep bad seq" style="--i:0">fail &rarr; wait 1&times;</div>
        <div class="lanehead seq" style="--i:1">try 2</div><div class="lstep bad seq" style="--i:1">fail &rarr; wait 2&times;</div>
        <div class="lanehead seq" style="--i:2">try 3</div><div class="lstep good seq pop" style="--i:2">success</div>
        <div class="lanehead seq" style="--i:3">cap</div><div class="lstep seq" style="--i:3">out of tries &rarr; throw (don't loop forever)</div>
      </div>
      <div class="dnote seq" style="--i:4">Delay <code>base &middot; 2**n</code>; cap the attempts. Unbounded retries against a dead dependency are a retry storm.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> "make it robust" almost always means bounded retries + backoff (ideally with jitter and a circuit breaker).</p>` },

  { eb:"lesson 20 · async toolkit", title:"Memoize & dedupe", html:`
    <p class="big">When many callers request the same key at once, you want <b class="hl">one</b> computation shared by all — not N identical fetches. Cache the in-flight <b class="hl">promise</b> per key, and evict it if it rejects.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">5 concurrent calls: x, x, x, y, x</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">x (1st)</div><div class="lstep good seq" style="--i:0">miss &rarr; start fetch(x) &middot; cache promise</div>
        <div class="lanehead seq" style="--i:1">x (rest)</div><div class="lstep seq" style="--i:1">hit &rarr; share the same promise</div>
        <div class="lanehead seq" style="--i:2">y</div><div class="lstep good seq" style="--i:2">miss &rarr; start fetch(y)</div>
        <div class="lanehead seq" style="--i:3">result</div><div class="lstep good seq pop" style="--i:3">fetch ran twice (x, y), not five times</div>
      </div>
      <div class="dnote seq" style="--i:4">Caching the resolved value (after <code>await</code>) loses the race — concurrent callers all miss and refetch.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> request dedup / single-flight is the JS "concurrent map" answer — collapse a stampede into one call.</p>` },

  { eb:"lesson 21 · async toolkit", title:"Cancellation & timeouts", html:`
    <p class="big">Starting work is easy; <b class="hl">stopping</b> it is the skill. An <code>AbortController</code> gives you a signal you pass into the work and <code>abort()</code> when you no longer want it — so the loser of a timeout, or the siblings of a failure, actually stop.</p>
    <div class="diagram anim" style="--step:.8s">
      <div class="dlabel">timeout that cancels the loser &middot; errgroup</div>
      <div class="lanes">
        <div class="lanehead seq" style="--i:0">timeout</div><div class="lstep seq" style="--i:0">timer wins &rarr; <b>abort()</b></div>
        <div class="lanehead seq" style="--i:1">work</div><div class="lstep good seq pop" style="--i:1">sees signal &rarr; stops &amp; cleans up (no leak)</div>
        <div class="lanehead seq" style="--i:2">errgroup</div><div class="lstep bad seq" style="--i:2">one task fails &rarr; abort the shared signal</div>
        <div class="lanehead seq" style="--i:3">siblings</div><div class="lstep good seq pop" style="--i:3">cancelled &mdash; no wasted work</div>
      </div>
      <div class="dnote seq" style="--i:4">A bare <code>Promise.race</code> reports the timeout but leaves the slow work running. Pass the signal and abort it.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> "now make it cancelable" is the follow-up that separates people who've shipped concurrent code from people who've only read about it.</p>` },

  { eb:"lesson 22 · durable execution", title:"Durable workflows & replay", html:`
    <p class="big">Some workflows run for days — an order that waits on payment, shipping, then a refund window. They can't just live in memory; a crash would lose them. Engines like <b class="hl">Temporal</b> persist them by recording every step to an <b class="hl">event history</b>, then <b class="hl">replaying</b> that history to rebuild state after any restart.</p>
    <div class="diagram anim" style="--step:.7s">
      <div class="dlabel">event history &rarr; replay rebuilds state</div>
      <div class="histtape">
        <span class="chip2 sync seq pop" style="--i:0">Start</span>
        <span class="chip2 macro seq pop" style="--i:1">Timer fired</span>
        <span class="chip2 micro seq pop" style="--i:2">Activity &rarr; "charged"</span>
        <span class="chip2 macro seq pop" style="--i:3">Signal: approve</span>
      </div>
      <div class="flowarrow seq" style="--i:4">&darr; replay re-runs the code over the tape</div>
      <div class="dnote seq" style="--i:5">The same history must produce the <b style="color:var(--ordered)">same decisions</b> every time. So workflow code must be <b class="hl">deterministic</b>: no <code>Date.now()</code>, no <code>Math.random()</code>, no direct I/O — those are recorded once, then replayed.</div>
    </div>
    <div class="row"><button class="playbtn" data-play>&#9654; replay</button></div>
    <p><b class="hl">Why it matters:</b> replay turns ordinary-looking code into a crash-proof process — but it bans nondeterminism, and the in-process hazards (signals interleaving at awaits, lesson 03) still apply. That's the durable-execution module.</p>` },

  { eb:"lesson 23 · interview essentials", title:"Blocking, non-blocking, async", html:`
    <p class="big">Three ways to deal with work that isn't ready yet — a distinction interviewers love to probe.</p>
    <p><b class="hl">Blocking</b>: the caller stops until the result is ready — <code>Atomics.wait()</code> in a worker, or <code>readFileSync</code>. JS avoids this on the main thread on purpose; a blocked thread does nothing. <b class="hl">Non-blocking</b>: the call returns immediately — success or "not yet" — and you decide whether to retry (a <code>tryAcquire()</code> that returns <code>false</code>, polling <code>Atomics.load</code>). No waiting, but you may busy-poll. <b class="hl">Async</b>: hand the work off and keep going; a promise delivers the result later (<code>await</code>). This is JS's default — one thread serves many in-flight operations.</p>
    <div class="diagram anim" style="--step:.7s">
      <div class="dlabel">three ways to handle "not ready yet"</div>
      <div class="lanes">

/* ---- workers & atomics simulator ---- */
let sim={threads:3,iters:3,atomic:false};
const ITER_SCALE=1_000_000;                 // each "increment" notch = 1,000,000 real ops
// Real SharedArrayBuffer + shared-memory Atomics only exist on a cross-origin-isolated page.
const REAL_RACE=(typeof SharedArrayBuffer!=="undefined") && (self.crossOriginIsolated===true);
const fmt=(n)=>n.toLocaleString("en-US");

// The genuine race: N Worker threads incrementing one shared Int32 over a SharedArrayBuffer.
// Every worker parks on Atomics.wait until the gate opens, so they collide head-on.
function runRealRace({threads,iters,atomic}){
  return new Promise((resolve,reject)=>{
    let view;
    try{
      const sab=new SharedArrayBuffer(8);   // [0] = counter, [1] = start gate
      view=new Int32Array(sab);
      const workers=[]; let ready=0, done=0;
      const cleanup=()=>workers.forEach(w=>w.terminate());
      for(let i=0;i<threads;i++){
        const w=new Worker("worker.js");
        w.onerror=(err)=>{ cleanup(); reject(err.message||"worker failed to load"); };
        w.onmessage=(e)=>{
          if(e.data.ready){
            if(++ready===threads){ Atomics.store(view,1,1); Atomics.notify(view,1); }  // open the gate for all at once
          }else if(e.data.done){
            if(++done===threads){
              cleanup();
              resolve({mem:Atomics.load(view,0),expected:threads*iters,threads,iters,atomic});
            }
          }
        };
        w.postMessage({buffer:sab,iters,atomic});
        workers.push(w);
      }
    }catch(err){ reject(err.message||String(err)); }
  });
}

function renderSim(){
  const real=REAL_RACE;
  main.appendChild(el(`<div>
    <div class="eyebrow">module 02</div>
    <h1>Workers &amp; Atomics</h1>
    <p class="lead">This is the one place JS has a real data race: multiple worker threads touching the same <b style="color:var(--text)">SharedArrayBuffer</b>. A plain <code style="font-family:var(--mono)">counter++</code> is three steps — read, add, write — and concurrent threads interleave those steps and clobber each other.</p>
    <p class="sub">${real
      ? `This page is <b style="color:var(--ordered)">cross-origin isolated</b>, so the run below spins up <b style="color:var(--text)">real Worker threads</b> over a genuine SharedArrayBuffer. With <b style="color:var(--text)">Atomic</b> off the count comes out wrong — and differently wrong each run. Flip it on and it&rsquo;s exact every time.`
      : `Real SharedArrayBuffer needs cross-origin isolation, which isn&rsquo;t available here, so the run below <b style="color:var(--text)">simulates</b> the interleaving step by step. The lost-update behavior is identical. Flip <b style="color:var(--text)">Atomic</b> off and run it a few times.`}</p>
  </div>`));

  const card=el(`<div class="card"><h2>${real?"Live data race":"Interleaving simulator"}</h2><div class="why">// each thread increments a shared counter</div></div>`);

  // isolation status badge
  const badge=el(`<div class="result ${real?"exact":""}" style="display:flex;align-items:center;gap:8px;margin:0 0 4px">
    ${real
      ? `<b style="color:var(--ordered)">● real threads</b> <span class="sub" style="font-size:12px">crossOriginIsolated = true · SharedArrayBuffer live</span>`
      : `<b style="color:var(--race)">● simulated</b> <span class="sub" style="font-size:12px">crossOriginIsolated = false · stepwise model</span>`}
  </div>`);
  if(!real) badge.style.borderColor="var(--line)";
  card.appendChild(badge);

  const ctrls=el(`<div class="ctrls"></div>`);
  const tEl=el(`<label class="ctrl">threads <input type="range" min="2" max="4" value="${sim.threads}"> <b style="color:var(--text)" data-tv>${sim.threads}</b></label>`);
  const iEl=el(`<label class="ctrl">${real?"×&nbsp;million inc":"×&nbsp;increments"} <input type="range" min="2" max="4" value="${sim.iters}"> <b style="color:var(--text)" data-iv>${sim.iters}</b></label>`);
  const aEl=el(`<div class="toggle ${sim.atomic?"on":""}"><div class="switch"></div> Atomic</div>`);
  tEl.querySelector("input").oninput=e=>{sim.threads=+e.target.value;tEl.querySelector("[data-tv]").textContent=sim.threads;};
  iEl.querySelector("input").oninput=e=>{sim.iters=+e.target.value;iEl.querySelector("[data-iv]").textContent=sim.iters;};
  aEl.onclick=()=>{sim.atomic=!sim.atomic;aEl.classList.toggle("on",sim.atomic);};
  ctrls.append(tEl,iEl,aEl);
  card.appendChild(ctrls);

  const runBtn=el(`<button class="btn go">▶ ${real?"run real threads":"run interleaving"}</button>`);
  const tape=el(`<div class="tape"></div>`);
  const result=el(`<div class="result" style="display:none"></div>`);
  const colors=["var(--accent)","var(--ordered)","var(--race)","#e0c25a"];

  const showResult=(mem,expected,extra)=>{
    result.style.display="block";
    const lost=expected-mem;
    result.className="result "+(lost===0?"exact":"lost");
    const head = lost===0
      ? `counter = ${fmt(mem)}  ·  expected ${fmt(expected)}  ·  exact`
      : `counter = ${fmt(mem)}  ·  expected ${fmt(expected)}  ·  ${fmt(lost)} update${lost>1?"s":""} lost`;
    result.textContent = extra ? head+"  ·  "+extra : head;
  };

  if(real){
    runBtn.onclick=async()=>{
      runBtn.disabled=true; const old=runBtn.textContent; runBtn.textContent="running…";
      tape.innerHTML="";
      const iters=sim.iters*ITER_SCALE;
      try{
        const out=await runRealRace({threads:sim.threads,iters,atomic:sim.atomic});
        showResult(out.mem,out.expected,`${out.threads} workers × ${fmt(iters)} · ${out.atomic?"Atomics.add":"view[0]=view[0]+1"}`);
      }catch(err){
        result.style.display="block"; result.className="result lost";
        result.textContent="worker error: "+err;
      }
      runBtn.disabled=false; runBtn.textContent=old;
    };
  }else{
    runBtn.onclick=()=>{
      const out=simulate(sim);
      tape.innerHTML="";
      out.tape.forEach(s=>{
        const label = s.op==="add" ? `T${s.t} add→${s.mem}`
          : s.op==="read" ? `T${s.t} read ${s.val}` : `T${s.t} write ${s.val}`;
        const chip=el(`<span class="step">${label}</span>`);
        chip.style.borderColor=colors[s.t]; chip.style.color=colors[s.t];
        tape.appendChild(chip);
      });
      showResult(out.mem,out.expected);
    };
  }
  card.appendChild(el(`<div class="row"></div>`)).appendChild(runBtn);
  card.appendChild(tape);
  card.appendChild(result);
  main.appendChild(card);

  main.appendChild(el(`<div class="card">
    <div class="why">// the fix, in real worker code</div>
    <pre class="code"><span class="cm">// racy — read, add, write can interleave</span>
counter[0] = counter[0] + 1;

<span class="cm">// safe — one indivisible operation</span>
<span class="ok">Atomics.add(counter, 0, 1);</span>

<span class="cm">// Atomics.wait / Atomics.notify build a real
// blocking lock across threads — the worker-world mutex.</span></pre>
    <p class="sub" style="margin-bottom:0">${real
      ? `This is exactly what runs above: <code style="font-family:var(--mono)">worker.js</code> increments a shared <code style="font-family:var(--mono)">Int32Array</code>, parked on <code style="font-family:var(--mono)">Atomics.wait</code> until every worker is ready so they collide head-on.`
      : `In the browser, real SharedArrayBuffer needs cross-origin isolation headers (<code style="font-family:var(--mono)">COOP</code> + <code style="font-family:var(--mono)">COEP</code>). On a host that sets them, this exact module runs genuine threads via <code style="font-family:var(--mono)">worker.js</code> instead of simulating.`}</p>
  </div>`));
}

function simulate({threads,iters,atomic}){
  const expected=threads*iters;
  if(atomic){
    const tape=[]; let mem=0;
    const seq=[]; for(let t=0;t<threads;t++) for(let k=0;k<iters;k++) seq.push(t);
    // shuffle
    for(let i=seq.length-1;i>0;i--){const j=rnd(i+1);[seq[i],seq[j]]=[seq[j],seq[i]];}
    seq.forEach(t=>{mem+=1;tape.push({t,op:"add",mem});});
    return {mem,tape,expected};
  }
  // non-atomic: each increment = read then write, with a private register
  let mem=0; const reg=new Array(threads).fill(0);
  const phase=new Array(threads).fill("read"); const remaining=new Array(threads).fill(iters);
  const tape=[]; let steps=threads*iters*2;
  while(steps>0){
    const active=[]; for(let i=0;i<threads;i++) if(remaining[i]>0) active.push(i);
    const t=active[rnd(active.length)];
    if(phase[t]==="read"){ reg[t]=mem; tape.push({t,op:"read",val:mem}); phase[t]="write"; }
    else { mem=reg[t]+1; tape.push({t,op:"write",val:mem}); phase[t]="read"; remaining[t]--; }
    steps--;
  }
  return {mem,tape,expected};
}

/* ---- test mode: randomized, shuffled options, scored, no hints until you answer ---- */
function testPool(){
  const out=[];
  Object.keys(DRILLS).forEach(mod=>DRILLS[mod].forEach(d=>out.push(
    {title:d.title, context:d.pre, question:d.blank.q, options:d.blank.options, answer:d.blank.answer, whys:d.blank.whys})));
  QUIZ.forEach(q=>out.push(
    {title:"Predict the output", context:q.code, question:"What does this print, in order?", options:q.options, answer:q.answer, whys:q.whys}));
  return out;
}
function shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=rnd(i+1); [x[i],x[j]]=[x[j],x[i]]; } return x; }
function shuffleOptions(q){
  const order=shuffle(q.options.map((_,i)=>i));
  return { ...q, options:order.map(i=>q.options[i]), whys:q.whys?order.map(i=>q.whys[i]):null, answer:order.indexOf(q.answer) };
}
function startTest(n){
  let pool=shuffle(testPool());
  if(n!=="all") pool=pool.slice(0,n);
  test={ on:true, qs:pool.map(shuffleOptions), idx:0, score:0, answered:false };
  render(); window.scrollTo({top:0});
}
function renderTest(){
  if(!test.on){
    main.appendChild(el(`<div>
      <div class="eyebrow">test yourself</div><h1>Test mode</h1>
      <p class="lead">No hints. First answer counts, and the options are shuffled — so you can't lean on "it's usually the first one." Random questions, a score at the end: a real check on whether it's stuck.</p>
      <p class="sub">Prep tip: once you can pass these cold, rebuild each pattern in a blank file while talking it through out loud — that's the skill the interview actually grades.</p>
    </div>`));
    const row=el(`<div class="row"></div>`);
    [["10 questions",10],["20 questions",20],["all "+testPool().length,"all"]].forEach(([label,n])=>{
      const b=el(`<button class="btn go">${label}</button>`); b.onclick=()=>startTest(n); row.appendChild(b);
    });
    main.appendChild(row);
    return;
  }
  if(test.idx>=test.qs.length){
    const n=test.qs.length, s=test.score, pct=Math.round(100*s/n);
    const msg = pct>=90?"Sharp — you're ready." : pct>=70?"Solid. Patch the misses and you're close." : "Worth another pass through the drills.";
    main.appendChild(el(`<div><div class="eyebrow">result</div><h1>${s} / ${n} <span class="sub" style="font-size:17px">· ${pct}%</span></h1><p class="lead">${msg}</p></div>`));
    const row=el(`<div class="row"></div>`);
    const again=el(`<button class="btn go">▶ retake</button>`); again.onclick=()=>{ test.on=false; render(); window.scrollTo({top:0}); };
    row.appendChild(again); main.appendChild(row);
    return;
  }
  const q=test.qs[test.idx];
  main.appendChild(el(`<div class="eyebrow">question ${test.idx+1} / ${test.qs.length} · ${test.score} correct</div>`));
  const card=el(`<div class="card"><h2>${esc(q.title)}</h2><pre class="code">${esc(q.context)}</pre></div>`);
  const blank=el(`<div class="blank"><div class="q">${esc(q.question)}</div></div>`);
  q.options.forEach((opt,oi)=>{
    const b=el(`<button class="opt">${esc(opt)}</button>`);
    b.onclick=()=>{
      if(test.answered) return;
      test.answered=true;
      const correct=oi===q.answer;
      if(correct) test.score++;
      blank.querySelectorAll(".opt").forEach((x,xi)=>{
        if(xi===q.answer) x.classList.add("correct");
        if(xi===oi && !correct) x.classList.add("wrong");
        x.style.pointerEvents="none";
      });
      if(q.whys) blank.appendChild(el(`<div class="why-line">${esc(q.whys[q.answer])}</div>`));
      const nrow=el(`<div class="row"></div>`);
      const nb=el(`<button class="btn go">${test.idx+1<test.qs.length?"next ›":"see score ›"}</button>`);
      nb.onclick=()=>{ test.idx++; test.answered=false; render(); window.scrollTo({top:0}); };
      nrow.appendChild(nb); card.appendChild(nrow);
    };
    blank.appendChild(b);
  });
  card.appendChild(blank);
  main.appendChild(card);
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
