<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Observability Bootcamp</title>
<meta name="description" content="A mobile-first, offline-capable bootcamp for production debugging — metrics, logs, and traces from first principles; histograms and burn-rate alerts you can run; animated lessons, tap-driven drills, and a scored test.">
<!-- PWA: installable + works offline -->
<meta name="theme-color" content="#061420">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Observability">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#061420; --surface:#0e2233; --surface2:#14293a; --line:#244155;
    --text:#e2ecf3; --muted:#8ca6b8; --faint:#647c8f;
    --ordered:#34d3bf;   /* in-order / correct */
    --race:#fb923c;      /* lost / contention */
    --accent:#4eaeff;    /* interactive */
    --ok-bg:rgba(52,211,191,.12); --bad-bg:rgba(251,146,60,.12);
    --code:#071726;      /* code panels — matches the hardcoded panel color in content packs */
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --r:16px;
    --ease:cubic-bezier(.22,1,.36,1);
    --shadow:0 1px 2px rgba(3,10,18,.35),0 14px 36px -18px rgba(3,10,18,.65);
    color-scheme:dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding-bottom:env(safe-area-inset-bottom);
    overflow-x:hidden;
  }
  /* ambient aurora: fixed glows in the three app hues, behind everything */
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(1100px 520px at 82% -12%, rgba(78,174,255,.14), transparent 62%),
      radial-gradient(900px 520px at -18% 22%, rgba(52,211,191,.07), transparent 60%),
      radial-gradient(760px 540px at 55% 118%, rgba(251,146,60,.06), transparent 62%);
  }
  ::selection{background:rgba(78,174,255,.4)}
  .wrap{max-width:600px;margin:0 auto;padding:0 clamp(16px,4.5vw,28px)}

  /* thin, quiet scrollbars for every scrollable panel */
  pre.code,.bughunt,.bankline,.built{scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
  pre.code::-webkit-scrollbar,.bughunt::-webkit-scrollbar,.bankline::-webkit-scrollbar,.built::-webkit-scrollbar{height:8px;width:8px}
  pre.code::-webkit-scrollbar-thumb,.bughunt::-webkit-scrollbar-thumb,.bankline::-webkit-scrollbar-thumb,.built::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:8px}
  pre.code::-webkit-scrollbar-track,.bughunt::-webkit-scrollbar-track,.bankline::-webkit-scrollbar-track,.built::-webkit-scrollbar-track{background:transparent}

  /* header */
  header{
    position:sticky;top:0;z-index:20;background:rgba(6,20,32,.78);
    backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .hbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 0 10px}
  .brand{display:flex;align-items:baseline;gap:8px;min-width:0;background:none;border:0;padding:0;font:inherit;color:inherit;text-align:left;cursor:pointer}
  .brand:active{transform:scale(.98)}
  .brand b{font-size:17px;letter-spacing:-.01em;white-space:nowrap}
  .brand .tick{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prog{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;flex:0 0 auto}
  .prog .n{color:var(--ordered)}
  .bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:10px}
  .bar > i{
    display:block;height:100%;width:0;border-radius:4px;position:relative;
    background:linear-gradient(90deg,var(--accent),var(--ordered));
    box-shadow:0 0 12px rgba(78,174,255,.55);
    transition:width .6s var(--ease);
  }
  .bar > i::after{
    content:"";position:absolute;inset:0;border-radius:inherit;
    background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.45) 50%,transparent 80%);
    background-size:220% 100%;animation:sheen 2.8s linear infinite;
  }
  @keyframes sheen{from{background-position:200% 0}to{background-position:-100% 0}}

  /* module chips */
  nav{
    display:flex;gap:8px;overflow-x:auto;padding:10px 2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
    mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 26px),transparent);
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 26px),transparent);
  }
  nav::-webkit-scrollbar{display:none}
  nav::after{content:"";flex:0 0 14px}  /* end spacer: the edge fade eats this, never the last chip */
  .chip{
    flex:0 0 auto;font-family:var(--mono);font-size:12px;letter-spacing:.02em;
    padding:8px 14px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;
    min-height:38px;
    transition:color .2s,border-color .2s,background .2s,box-shadow .2s,transform .12s;
  }
  .chip:active{transform:scale(.95)}
  .chip[aria-selected="true"]{
    background:linear-gradient(135deg,#7cc2ff,var(--accent) 60%,#0b82e6);
    border-color:transparent;color:#071726;font-weight:600;
    box-shadow:0 3px 16px -4px rgba(78,174,255,.65);
  }

  /* eyebrow + headings */
  .eyebrow{
    display:flex;align-items:center;gap:9px;
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin:28px 0 8px;
  }
  .eyebrow::before{content:"";flex:0 0 auto;width:18px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--accent),transparent)}
  h1{font-size:clamp(26px,6.4vw,34px);line-height:1.12;letter-spacing:-.025em;font-weight:800;margin:0 0 10px}
  h2{font-size:19px;letter-spacing:-.01em;margin:0 0 6px}
  p.lead{color:var(--muted);font-size:15px;margin:0 0 8px}
  .sub{color:var(--muted);font-size:14px}

  /* card */
  .card{
    background:linear-gradient(180deg,rgba(255,255,255,.022),transparent 42%) var(--surface);
    border:1px solid var(--line);border-radius:var(--r);
    padding:clamp(16px,4vw,22px);margin:16px 0;
    box-shadow:var(--shadow);position:relative;
  }
  .card::before{
    content:"";position:absolute;top:0;left:14%;right:14%;height:1px;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  }
  .card h2{margin-bottom:2px}
  .card .why{color:var(--faint);font-size:13px;font-family:var(--mono);margin:0 0 12px}

  /* the whole module rises in softly, top to bottom */
  main > *{animation:rise .5s var(--ease) both}
  main > *:nth-child(2){animation-delay:.06s}
  main > *:nth-child(3){animation-delay:.12s}
  main > *:nth-child(n+4){animation-delay:.18s}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* code */
  pre.code{
    background:var(--code);border:1px solid var(--line);border-radius:12px;
    font-family:var(--mono);font-size:12.5px;line-height:1.7;color:#c6d8e6;
    padding:13px 14px;margin:10px 0;overflow-x:auto;white-space:pre;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
  }
  pre.code .cm{color:var(--faint)}
  pre.code .kw{color:var(--accent)}
  pre.code .ok{color:var(--ordered)}

  /* blank chooser */
  .blank{margin:9px 0;border-left:2px solid var(--race);padding-left:11px}
  .blank .q{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--race);text-transform:uppercase;margin-bottom:6px}
  .blank.solved{border-color:var(--ordered)}
  .blank.solved .q{color:var(--ordered)}
  .opt{
    display:block;width:100%;text-align:left;font-family:var(--mono);font-size:12px;line-height:1.55;
    background:var(--code);border:1px solid var(--line);color:#c6d8e6;border-radius:10px;
    padding:11px 12px;margin:7px 0;cursor:pointer;white-space:pre-wrap;
    transition:border-color .18s,background .18s,transform .1s;
  }
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered);animation:win .4s var(--ease)}
  .opt.wrong{border-color:var(--race);background:var(--bad-bg);color:var(--race);animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  @keyframes win{0%{transform:scale(.985)}45%{transform:scale(1.012)}100%{transform:none}}
  .why-line{font-size:12.5px;color:var(--muted);margin:8px 0 2px;padding:8px 0 8px 10px;border-left:2px solid var(--line)}

  /* spot-the-bug: tappable code lines */
  .scen{font-size:13.5px;color:var(--text);margin:10px 0 2px;padding-left:10px;border-left:2px solid var(--race)}
  .card.solved .scen{border-color:var(--ordered)}
  .bughunt{background:var(--code);border:1px solid var(--line);border-radius:12px;padding:6px;margin:10px 0;overflow:auto;max-height:62vh}
  .bughunt.shake{animation:shake .3s}
  .codeline.blankline{cursor:default;pointer-events:none;min-height:9px}
  .codeline{
    display:flex;gap:10px;width:100%;text-align:left;font-family:var(--mono);font-size:12.5px;line-height:1.7;
    background:transparent;border:1px solid transparent;border-radius:7px;color:#c6d8e6;padding:1px 8px;margin:0;cursor:pointer;
    transition:background .15s,border-color .15s;
  }
  .codeline:active{transform:scale(.997)}
  .codeline .ln{color:var(--faint);user-select:none;min-width:1.6em;text-align:right;flex:0 0 auto}
  .codeline .src{white-space:pre;flex:1 1 auto}
  .codeline.sel{background:rgba(78,174,255,.16);border-color:var(--accent)}
  .codeline.buggy{background:var(--bad-bg);border-color:var(--race);color:var(--race)}
  .codeline.buggy .ln{color:var(--race)}
  .codeline.miss{border:1px dashed var(--race);opacity:.7}
  .codeline:disabled{cursor:default}

  /* write it: assemble the implementation from a shuffled line bank */
  .built{background:var(--code);border:1px solid var(--line);border-radius:12px;padding:6px;margin:0;overflow-x:auto}
  .built .ghost{font-family:var(--mono);font-size:12px;color:var(--faint);padding:12px;text-align:center;border:1px dashed var(--line);border-radius:8px;margin:4px}
  .wline{display:flex;gap:10px;width:100%;text-align:left;font-family:var(--mono);font-size:12.5px;line-height:1.7;background:rgba(78,174,255,.08);border:1px solid var(--line);border-radius:7px;color:#c6d8e6;padding:2px 8px;margin:3px 0;cursor:pointer;transition:border-color .15s,background .15s;animation:rise .3s var(--ease)}
  .wline .ln{color:var(--faint);user-select:none;min-width:1.6em;text-align:right;flex:0 0 auto}
  .wline .src{white-space:pre;flex:1 1 auto}
  .wline:active{transform:scale(.997)}
  .wline.locked{cursor:default;background:var(--ok-bg);border-color:rgba(52,211,191,.35)}
  .banklabel{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--race);text-transform:uppercase;margin:12px 0 6px}
  .bankbox{display:flex;flex-direction:column;gap:6px}
  .bankline{display:block;width:100%;text-align:left;font-family:var(--mono);font-size:12.5px;line-height:1.7;background:var(--surface2);border:1px dashed var(--line);border-radius:9px;color:#c6d8e6;padding:7px 11px;cursor:pointer;white-space:pre;overflow-x:auto;transition:border-color .15s,background .15s}
  .bankline:active{transform:scale(.995)}

  /* buttons */
  .btn{
    font-family:var(--mono);font-size:13px;letter-spacing:.02em;
    padding:11px 16px;border-radius:11px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);cursor:pointer;min-height:44px;
    transition:border-color .18s,background .18s,box-shadow .18s,transform .12s,filter .18s;
  }
  .btn:active{transform:scale(.97)}
  .btn.go{
    background:linear-gradient(135deg,#7cc2ff,var(--accent) 55%,#0b82e6);
    border-color:transparent;color:#071726;font-weight:600;
    box-shadow:0 4px 18px -6px rgba(78,174,255,.55);
  }
  .btn.review{background:transparent;border-color:var(--accent);color:var(--accent);font-weight:600}
  .btn:disabled{opacity:.4;cursor:default;box-shadow:none;transform:none}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}

  /* clickable progress indicator -> jump-to-item menu */
  .stepjump{position:relative;display:flex}
  .posbtn{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    background:var(--surface2);border:1px solid var(--line);border-radius:9px;
    padding:8px 12px;min-height:38px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:border-color .18s,color .18s;
  }
  .posbtn .caret{font-size:9px;opacity:.7;transition:transform .18s}
  .posbtn[aria-expanded="true"]{border-color:var(--accent);color:var(--text)}
  .posbtn[aria-expanded="true"] .caret{transform:rotate(180deg)}
  .stepmenu{
    position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);z-index:40;
    width:max-content;max-width:min(84vw,340px);max-height:min(52vh,360px);overflow-y:auto;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:6px;
    box-shadow:0 14px 44px -10px rgba(0,0,0,.65);animation:stepmenuin .16s var(--ease);
  }
  .stepmenu[hidden]{display:none}
  @keyframes stepmenuin{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%)}}
  .stepitem{
    display:flex;gap:9px;width:100%;text-align:left;font-family:var(--mono);font-size:12.5px;line-height:1.5;
    color:#c6d8e6;background:transparent;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;
    white-space:normal;transition:background .12s,color .12s;
  }
  .stepitem .num{color:var(--faint);flex:0 0 auto;min-width:20px;text-align:right}
  .stepitem.cur{color:var(--accent);background:rgba(78,174,255,.1)}
  .stepitem.cur .num{color:var(--accent)}
  /* interview-sim countdown in the question eyebrow */
  .eyebrow .clock{font-weight:600}
  .eyebrow .clock.low{color:var(--race);animation:pulse 1.2s ease-in-out infinite}

  /* console */
  .console{
    font-family:var(--mono);font-size:12px;line-height:1.65;background:#03101b;
    border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:10px;
    white-space:pre-wrap;min-height:20px;color:#a6bfd0;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.3);
  }
  .console .pass{color:var(--ordered);text-shadow:0 0 14px rgba(52,211,191,.4)}
  .console .fail{color:var(--race)}

  /* done badge */
  .done{
    display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
    color:var(--ordered);letter-spacing:.04em;
    background:var(--ok-bg);border:1px solid rgba(52,211,191,.3);border-radius:999px;padding:3px 10px;
    animation:donein .45s var(--ease);
  }
  .done.hidden{display:none}
  @keyframes donein{from{opacity:0;transform:scale(.6)}60%{transform:scale(1.08)}to{opacity:1;transform:none}}

  /* quiz / flashcard */
  .qopt{display:block;width:100%;text-align:left;font-size:14px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:12px 13px;margin:7px 0;cursor:pointer;min-height:44px;transition:border-color .18s,background .18s,transform .1s}
  .qopt:active{transform:scale(.99)}
  .qopt.correct{border-color:var(--ordered);background:var(--ok-bg);animation:win .4s var(--ease)}
  .qopt.wrong{border-color:var(--race);background:var(--bad-bg);animation:shake .3s}
  .flash{
    background:linear-gradient(180deg,rgba(78,174,255,.06),transparent 55%) var(--surface);
    border:1px solid var(--line);border-radius:var(--r);padding:clamp(18px,5vw,26px);min-height:150px;cursor:pointer;
    display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);
    animation:flipin .45s var(--ease);
  }
  .flash.back{background:linear-gradient(180deg,rgba(52,211,191,.06),transparent 55%) var(--surface);border-color:rgba(52,211,191,.3)}
  @keyframes flipin{from{opacity:0;transform:perspective(900px) rotateX(-14deg)}to{opacity:1;transform:none}}
  .flash .face{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .flash .body{font-size:15.5px;line-height:1.6}
  .flash.back .face{color:var(--ordered)}

  /* simulator */
  .ctrls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:10px 0}
  .ctrl{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .ctrl input[type=range]{vertical-align:middle;width:120px;accent-color:var(--accent)}
  .toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:12px;min-height:38px;user-select:none}
  .switch{width:44px;height:25px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);position:relative;transition:background .25s,border-color .25s,box-shadow .25s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--muted);transition:transform .25s var(--ease),background .25s}
  .toggle.on .switch{background:var(--ordered);border-color:var(--ordered);box-shadow:0 0 14px rgba(52,211,191,.4)}
  .toggle.on .switch::after{transform:translateX(19px);background:#071726}
  .tape{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0}
  .step{font-family:var(--mono);font-size:10.5px;padding:4px 6px;border-radius:6px;border:1px solid var(--line);background:var(--code);animation:rise .3s var(--ease) both}
  .result{font-family:var(--mono);font-size:13px;margin-top:8px;padding:11px 13px;border-radius:11px;border:1px solid var(--line)}
  .result.lost{border-color:var(--race);background:var(--bad-bg);color:var(--race)}
  .result.exact{border-color:var(--ordered);background:var(--ok-bg);color:var(--ordered);box-shadow:0 0 20px -8px rgba(52,211,191,.5)}

  footer{color:var(--faint);font-size:12px;text-align:center;padding:34px 0 46px;font-family:var(--mono)}
  footer .credit{display:block;margin-bottom:14px}
  footer .credit a{color:var(--accent);text-decoration:none}
  footer .credit a:hover,footer .credit a:active{text-decoration:underline}
  .installbtn{
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--accent);
    background:transparent;border:1px solid var(--accent);border-radius:9px;
    padding:8px 13px;margin-right:8px;cursor:pointer;min-height:36px;transition:background .2s;
  }
  .installbtn:hover,.installbtn:active{background:rgba(78,174,255,.12)}
  .installbtn[hidden]{display:none}
  .resetbtn{
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint);
    background:transparent;border:1px solid var(--line);border-radius:9px;
    padding:8px 13px;cursor:pointer;min-height:36px;transition:color .2s,border-color .2s;
  }
  .resetbtn:hover,.resetbtn:active{color:var(--race);border-color:var(--race)}
  a{color:var(--accent)}

  /* lesson <-> skill cross-links */
  .xlinkrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .xlink{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;min-height:34px;line-height:1.35;text-align:left;transition:border-color .18s,background .18s,box-shadow .18s,transform .12s}
  .xlink:hover,.xlink:active{border-color:var(--accent);background:#12283a}
  .xlink:active{transform:scale(.98)}
  .xlink b{color:var(--text);font-weight:600}
  .xlink .dot{color:var(--ordered)}
  .xlink small{color:var(--faint);font-size:11px}

  /* lessons */
  .lesson p{color:var(--muted);font-size:14.5px;margin:11px 0}
  .lesson p.big{font-size:15.5px;color:var(--text);margin-top:2px}
  .lesson b.hl{color:var(--text)}
  .lesson code{font-family:var(--mono);font-size:12px;background:var(--code);border:1px solid var(--line);border-radius:6px;padding:1px 5px;color:#c6d8e6}
  .diagram{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:15px;margin:16px 0;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
  .dcols{display:flex;gap:14px;flex-wrap:wrap}
  .dcol{flex:1;min-width:130px}
  .dlabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .dnote{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.65}
  .chip2{display:inline-block;font-family:var(--mono);font-size:11.5px;padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:var(--code);color:#c6d8e6;margin:3px 3px 3px 0}
  .chip2.micro{border-color:var(--ordered);color:var(--ordered)}
  .chip2.macro{border-color:var(--race);color:var(--race)}
  .chip2.sync{border-color:var(--accent);color:var(--accent)}
  .stackcol{display:flex;flex-direction:column-reverse;gap:5px}
  .frame{font-family:var(--mono);font-size:11.5px;background:var(--code);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:6px 9px;color:#c6d8e6}
  .qbox{border:1px dashed var(--line);border-radius:8px;padding:9px;margin-top:8px}
  .qbox.micro{border-color:rgba(52,211,191,.45)}
  .qbox.macro{border-color:rgba(251,146,60,.45)}
  .lanes{display:grid;grid-template-columns:auto 1fr;gap:6px 10px;align-items:center;font-family:var(--mono);font-size:11.5px}
  .lanehead{color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-size:9.5px}
  .lstep{background:var(--code);border:1px solid var(--line);border-radius:6px;padding:6px 9px;color:#c6d8e6}
  .lstep.bad{border-color:var(--race);color:var(--race);background:var(--bad-bg)}
  .lstep.good{border-color:var(--ordered);color:var(--ordered);background:var(--ok-bg)}
  .lstep.wait{color:var(--faint);border-style:dashed}
  .flowarrow{text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px;margin:8px 0}
  .memcell{display:inline-flex;align-items:center;justify-content:center;min-width:50px;height:42px;padding:0 8px;border:1px solid var(--accent);border-radius:8px;font-family:var(--mono);font-size:16px;color:var(--text);background:var(--code)}
  .threadbox{flex:1;min-width:96px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.5}
  .permits{display:flex;gap:6px}
  .permit{width:22px;height:22px;border-radius:6px;border:1px solid var(--ordered);background:var(--ok-bg)}
  .permit.used{border-color:var(--line);background:var(--code)}
  .histtape{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  /* paired reference implementation inside a lesson */
  .impl{border-left:2px solid var(--accent);padding-left:12px;margin:16px 0 6px}
  .impl .dlabel{color:var(--accent);margin-bottom:6px}
  .impl pre.code{margin:0}
  /* entity stage: producer / queue / consumer boxes with flowing items */
  .estage{display:block;margin:4px auto 2px;max-width:100%;height:auto}
  .ecap{fill:none}
  .pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* lesson animations: .seq items reveal in --i order once .anim gets .playing */
  .anim.playing .seq{animation:seqin .5s ease both;animation-delay:calc(var(--i,0) * var(--step,.6s))}
  .anim.playing .seq.pop{animation:seqpop .52s ease both;animation-delay:calc(var(--i,0) * var(--step,.6s))}
  @keyframes seqin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:none}}
  @keyframes seqpop{0%{opacity:0;transform:scale(.9)}60%{transform:scale(1.06)}100%{opacity:1;transform:none}}
  .spin{display:inline-block;animation:spin 3.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .playbtn{font-family:var(--mono);font-size:12px;letter-spacing:.02em;padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);color:var(--text);cursor:pointer;min-height:36px;margin-top:2px;transition:border-color .18s,background .18s}
  .playbtn:active{transform:scale(.97)}

  /* pointer-precision niceties: hover states only where hover exists */
  @media(hover:hover) and (pointer:fine){
    .chip:not([aria-selected="true"]):hover{border-color:var(--accent);color:var(--text)}
    .btn:hover:not(:disabled){border-color:var(--accent)}
    .btn.go:hover:not(:disabled){filter:brightness(1.08);box-shadow:0 6px 24px -6px rgba(78,174,255,.7);transform:translateY(-1px)}
    .btn.review:hover:not(:disabled){background:rgba(78,174,255,.1)}
    .opt:hover,.qopt:hover{border-color:rgba(78,174,255,.55)}
    .bankline:hover{border-color:var(--accent);border-style:solid;background:rgba(78,174,255,.1)}
    .wline:not(.locked):hover{border-color:var(--race)}
    .codeline:not(:disabled):not(.blankline):hover{background:rgba(78,174,255,.08)}
    .playbtn:hover{border-color:var(--accent)}
    .posbtn:hover{border-color:var(--accent);color:var(--text)}
    .stepitem:not(.cur):hover{background:var(--surface2)}
    .card:not(.lesson):hover{border-color:#315066}
    .flash:hover{border-color:var(--accent);transform:translateY(-2px);transition:transform .25s var(--ease),border-color .25s}
    .flash.back:hover{border-color:var(--ordered)}
  }

  /* wider canvas + roomier type once there's space (tablet / desktop) */
  @media(min-width:720px){
    .wrap{max-width:700px}
    body{line-height:1.6}
    .brand b{font-size:18px}
    .bar{height:5px}
    p.lead{font-size:16px}
    .sub{font-size:14.5px}
    .lesson p{font-size:15.5px}
    .lesson p.big{font-size:16.5px}
    h2{font-size:21px}
    pre.code,.codeline,.wline,.bankline{font-size:13px}
    .opt{font-size:12.5px}
    .qopt{font-size:15px}
    .flash{min-height:190px}
    .flash .body{font-size:17px}
    .ctrl input[type=range]{width:150px}
    .card{margin:18px 0}
    .eyebrow{margin-top:34px}
  }
  @media(min-width:1080px){
    .wrap{max-width:740px}
    .bughunt{max-height:70vh}
  }
  /* tight phones: drop the header tagline so brand + progress never collide */
  @media(max-width:430px){
    .brand .tick{display:none}
  }

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
