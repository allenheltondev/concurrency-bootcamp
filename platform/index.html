<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="description" content="Ready, Set, Cloud courses — hands-on, tap-driven bootcamps with synced progress." />
    <title>Ready, Set, Cloud Courses</title>
    <!-- Apply the persisted AppNav theme before first paint (no flash of the
         wrong palette). Mirrors the "rsc:theme" key SiteNav writes. -->
    <script>
      try {
        var t = localStorage.getItem("rsc:theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
