AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Concurrency Bootcamp — private S3 bucket served by CloudFront with Origin Access
  Control, a custom domain, and a Response Headers Policy that adds COOP/COEP so the
  page is cross-origin isolated (required for real SharedArrayBuffer + Worker threads).
  Deploy in us-east-1: CloudFront's ACM certificate must live there.

# W1028 fires inside the SAM transform's generated HttpApi Body: attaching a
# conditioned function route to a conditioned API makes SAM emit a nested
# Fn::If whose false branch cfn-lint flags as unreachable. Transform artifact,
# not authored YAML — nothing to fix on our side.
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1028

Parameters:
  DomainName:
    Type: String
    Default: bootcamp.readysetcloud.io
    Description: Fully-qualified custom domain the app is served at.
  HostedZoneId:
    Type: String
    Default: Z00189091F2OMRDR5LA95
    Description: Route53 hosted zone ID for the parent domain (readysetcloud.io).
  UserPoolId:
    Type: String
    Default: ""
    Description: >-
      Id of the shared Ready, Set, Cloud Cognito user pool the backend
      authenticates against. Leave empty to deploy the static site only —
      every backend resource (API, table, app client, the CloudFront /api
      behavior) is conditioned on this value, so the stack stays valid and
      the site untouched until the id is supplied.

Conditions:
  BackendEnabled: !Not [!Equals [!Ref UserPoolId, ""]]

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref Table
        POWERTOOLS_SERVICE_NAME: concurrency-bootcamp-api
        POWERTOOLS_METRICS_NAMESPACE: ConcurrencyBootcamp
        POWERTOOLS_LOG_LEVEL: INFO
        NODE_OPTIONS: --enable-source-maps

Resources:
  # ---- Private origin bucket (no public access, no ACLs) ----
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ---- DNS-validated certificate (Route53 records created automatically) ----
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  # ---- COOP + COEP: the cross-origin-isolation headers S3 can't set on its own ----
  IsolationHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-cross-origin-isolation"
        Comment: Adds COOP/COEP so crossOriginIsolated === true.
        CustomHeadersConfig:
          Items:
            - Header: Cross-Origin-Opener-Policy
              Value: same-origin
              Override: true
            - Header: Cross-Origin-Embedder-Policy
              Value: require-corp
              Override: true

  # ---- Directory index rewrite: DefaultRootObject only covers "/", so
  # subdirectory courses (/distributed-systems/) need a viewer-request rewrite
  # to their own index.html. Extensionless paths get the same treatment. ----
  DirectoryIndexFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-dir-index"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite directory URIs to their index.html (subdirectory courses)
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
          } else if (!uri.split('/').pop().includes('.')) {
            request.uri = uri + '/index.html';
          }
          return request;
        }

  # ---- Origin Access Control: keeps the bucket private, lets only this distro read it ----
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Concurrency Bootcamp
        Aliases:
          - !Ref DomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_All
        Origins: !If
          - BackendEnabled
          - - Id: S3Origin
              DomainName: !GetAtt SiteBucket.RegionalDomainName
              OriginAccessControlId: !GetAtt OriginAccessControl.Id
              S3OriginConfig:
                OriginAccessIdentity: ""
            - Id: ApiOrigin
              DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]
          - - Id: S3Origin
              DomainName: !GetAtt SiteBucket.RegionalDomainName
              OriginAccessControlId: !GetAtt OriginAccessControl.Id
              S3OriginConfig:
                OriginAccessIdentity: ""
        # Same-origin API: /api/* goes to API Gateway, everything else to S3.
        # CachingDisabled (every request hits the API) + AllViewerExceptHostHeader
        # (forwards Authorization, withholds Host so execute-api resolves).
        # No response headers policy: COOP/COEP belong to the page, not the API.
        CacheBehaviors: !If
          - BackendEnabled
          - - PathPattern: "/api/*"
              TargetOriginId: ApiOrigin
              ViewerProtocolPolicy: https-only
              Compress: true
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
              CachedMethods: [GET, HEAD]
              # Managed CachingDisabled policy.
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
              # Managed AllViewerExceptHostHeader origin request policy.
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # Managed CachingOptimized policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref IsolationHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt DirectoryIndexFunction.FunctionMetadata.FunctionARN
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # ---- Bucket policy: only this CloudFront distribution may read objects ----
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # ---- Custom domain -> CloudFront (A + AAAA aliases) ----
  AliasRecordV4:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # fixed global CloudFront alias zone
        EvaluateTargetHealth: false

  AliasRecordV6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ===========================================================
  # Backend (all conditional on UserPoolId being supplied)
  # ===========================================================

  # ---- Single table: courses/badges catalogs + per-user progress, stats, badges ----
  Table:
    Type: AWS::DynamoDB::Table
    Condition: BackendEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DeletionProtectionEnabled: true
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ---- App-specific client in the shared Ready, Set, Cloud user pool.
  # Shared users (same sub everywhere), dedicated audience: tokens minted for
  # other RSC apps are rejected by this API's authorizer, and this app's
  # token lifetimes can change without touching other apps. No Hosted UI /
  # OAuth config: the site ships its own sign-in/sign-up screens
  # (js/account.js) that call the Cognito user pool API directly. ----
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: BackendEnabled
    Properties:
      UserPoolId: !Ref UserPoolId
      ClientName: !Sub "${AWS::StackName}-web"
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        # USER_PASSWORD_AUTH is the custom auth UI's sign-in flow (TLS
        # everywhere; SRP without a library isn't worth the complexity) —
        # the integration smoke script uses it too.
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ---- HTTP API behind CloudFront's /api/* behavior. Route keys include the
  # /api prefix because CloudFront forwards paths verbatim (it can't strip a
  # prefix). Every route requires a valid JWT from the shared pool, scoped to
  # this app's client. ----
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Condition: BackendEnabled
    Properties:
      # Bounded, not generous: a learning app syncing progress needs nowhere
      # near this; the cap exists so a bug or abuse can't run up the bill.
      DefaultRouteSettings:
        ThrottlingRateLimit: 50
        ThrottlingBurstLimit: 100
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
              audience:
                - !Ref UserPoolClient

  # ---- The API lambdalith: one function behind ANY /api/*, with the
  # Powertools event-handler Router resolving paths internally. Bundled by
  # esbuild through sam build (npm ci in backend/ first); the AWS SDK stays
  # external because the runtime ships it. ----
  ApiFunction:
    Type: AWS::Serverless::Function
    Condition: BackendEnabled
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: node22
        # Sourcemaps + --enable-source-maps (below) keep stack traces in the
        # structured error logs readable despite minification.
        Sourcemap: true
        EntryPoints:
          - src/api.mjs
        External:
          - "@aws-sdk/*"
    Properties:
      CodeUri: backend/
      Handler: api.handler
      Tracing: Active
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Table
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: ANY
            Path: /api/{proxy+}

  # ---- Explicit log group: without this, Lambda auto-creates one that
  # retains logs forever. ----
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: BackendEnabled
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: 30

Outputs:
  SiteUrl:
    Description: Live HTTPS URL.
    Value: !Sub "https://${DomainName}"
  BucketName:
    Description: Origin bucket to upload index.html and worker.js into.
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution ID (use for cache invalidations).
    Value: !Ref Distribution
  DistributionDomain:
    Description: Default CloudFront domain (fallback URL).
    Value: !GetAtt Distribution.DomainName
  ApiUrl:
    Condition: BackendEnabled
    Description: Public base URL of the backend API (through CloudFront).
    Value: !Sub "https://${DomainName}/api"
  UserPoolClientId:
    Condition: BackendEnabled
    Description: This app's client id in the shared user pool (the UI phase needs it).
    Value: !Ref UserPoolClient
  TableName:
    Condition: BackendEnabled
    Description: DynamoDB table holding catalogs, progress, stats, and badges.
    Value: !Ref Table
